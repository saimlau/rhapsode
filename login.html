<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in · Rhapsode</title>
<style>
:root {
  --desk: #ECEAE6; --side: #E6E3DC; --ink: #2A2721; --muted: #8A857A;
  --hairline: rgba(40, 33, 20, .14);
  --marker: #F5B301; --marker-wash: rgba(245, 179, 1, .14);
  --error: #A33F35;
  --serif: "New York", "Iowan Old Style", Georgia, serif;
  --mono: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, monospace;
  --sans: system-ui, -apple-system, "Segoe UI", sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --desk: #1B1A18; --side: #22211E; --ink: #E6E2D8; --muted: #8E8A80;
    --hairline: rgba(255, 250, 235, .13); --marker-wash: rgba(245, 179, 1, .10);
    --error: #E09287;
  }
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0; background: var(--desk); color: var(--ink);
  font-family: var(--sans);
  display: grid; place-items: center; padding: 24px;
}
main { width: 100%; max-width: 22rem; }

/* the wordmark carries the product's one gesture: a highlighter drawn
   under it, the same amber that tracks the spoken sentence */
/* painted as a background gradient rather than a z-index:-1 pseudo-element,
   which renders behind the page background and disappears entirely */
h1 {
  font-family: var(--serif); font-weight: 500; font-size: 2.1rem;
  margin: 0 0 .1em; letter-spacing: -.01em; display: inline-block;
  background-image: linear-gradient(var(--marker), var(--marker));
  background-repeat: no-repeat; background-position: 0 .82em;
  background-size: 0% .34em;
  animation: sweep .55s cubic-bezier(.2, .7, .3, 1) .15s forwards;
}
@keyframes sweep { to { background-size: 100% .34em; } }
@media (prefers-reduced-motion: reduce) {
  h1 { animation: none; background-size: 100% .34em; }
}

.tag {
  color: var(--muted); font-size: .82rem; margin: 0 0 2rem;
  font-family: var(--mono); letter-spacing: .04em;
}
label {
  display: block; font-size: .7rem; letter-spacing: .13em;
  text-transform: uppercase; color: var(--muted); margin-bottom: .5rem;
  font-family: var(--mono);
}
input[type=password], input[type=text] {
  width: 100%; padding: .7rem .8rem; font: inherit; color: var(--ink);
  background: var(--side); border: 1px solid var(--hairline);
  border-radius: 3px; outline: none;
}
/* focus reads as a highlighter laid over the field, not a browser ring */
input[type=password]:focus, input[type=text]:focus {
  background: var(--marker-wash); border-color: var(--marker);
  box-shadow: inset 0 -2px 0 var(--marker);
}
button {
  margin-top: 1rem; width: 100%; padding: .7rem; font: inherit;
  font-weight: 600; color: var(--desk); background: var(--ink);
  border: 0; border-radius: 3px; cursor: pointer;
}
button:hover { background: #3b3730; }
@media (prefers-color-scheme: dark) { button:hover { background: #d8d3c6; } }
button:focus-visible, input:focus-visible { outline: 2px solid var(--marker);
  outline-offset: 2px; }
.bad {
  color: var(--error); font-size: .82rem; margin: 1rem 0 0;
  border-left: 2px solid var(--error); padding-left: .6rem;
}
footer {
  margin-top: 2.5rem; color: var(--muted); font-size: .72rem;
  font-family: var(--mono); border-top: 1px solid var(--hairline);
  padding-top: .8rem;
}
</style>

<main>
  <h1>Rhapsode</h1>
  <p class="tag">papers, read aloud</p>

  <form method="post" action="/login">
    <label for="who">Username</label>
    <input id="who" name="username" type="text" autofocus required
           autocapitalize="none" autocorrect="off" spellcheck="false"
           autocomplete="username">
    <label for="pw" style="margin-top:1.1rem">Password</label>
    <input id="pw" name="password" type="password" required
           autocomplete="current-password">
    <button type="submit">Sign in</button>
    <p class="bad">That didn't match. Try again.</p>
  </form>

  <footer>This library is private.</footer>
</main>
