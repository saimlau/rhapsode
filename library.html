<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>paper2audio library</title>
<style>
:root {
  --desk: #ECEAE6;
  --side: #E6E3DC;
  --ink: #2A2721;
  --muted: #8A857A;
  --hairline: rgba(40, 33, 20, .14);
  --marker: #F5B301;
  --marker-wash: rgba(245, 179, 1, .14);
  --error: #A33F35;
  --serif: "New York", "Iowan Old Style", Georgia, serif;
  --mono: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, monospace;
  --sans: system-ui, -apple-system, "Segoe UI", sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --desk: #1B1A18; --side: #22211E; --ink: #E6E2D8; --muted: #8E8A80;
    --hairline: rgba(255, 250, 235, .13); --marker-wash: rgba(245, 179, 1, .10);
    --error: #E09287;
  }
}
* { box-sizing: border-box; scrollbar-width: thin;
    scrollbar-color: rgba(40, 33, 20, .28) transparent; }
@media (prefers-color-scheme: dark) {
  * { scrollbar-color: rgba(255, 250, 235, .22) transparent; }
}
html, body { margin: 0; height: 100%; }
body { display: flex; background: var(--desk); font-family: var(--sans);
       color: var(--ink); }

#main { flex: 1; min-width: 0; position: relative; }
#frame { width: 100%; height: 100%; border: 0; display: none; }
#empty {
  height: 100%; display: grid; place-items: center; color: var(--muted);
  text-align: center; font-size: 14.5px; line-height: 1.8; padding: 40px;
}
#empty .big { font: 24px var(--serif); color: var(--ink); }

/* --------------------------------------------------- sidebar: journal ToC */
#side {
  width: 320px; flex: none; background: var(--side);
  border-left: 1px solid var(--hairline);
  display: flex; flex-direction: column;
}
#side header {
  padding: 18px 18px 10px; display: flex; align-items: baseline;
  justify-content: space-between;
}
#side header h1 {
  margin: 0; font: 600 11px var(--sans); letter-spacing: .14em;
  text-transform: uppercase; color: var(--muted); cursor: pointer;
  max-width: 220px; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis;
}
#side header h1:hover { color: var(--ink); }
#plmenu {
  position: fixed; display: none; z-index: 70; min-width: 210px;
  background: var(--side); color: var(--ink);
  border: 1px solid var(--hairline); border-radius: 10px; padding: 4px;
  box-shadow: 0 8px 30px rgba(0, 0, 0, .25);
}
#plmenu button {
  display: block; width: 100%; text-align: left; background: none; border: 0;
  color: inherit; padding: 8px 12px; border-radius: 7px; cursor: pointer;
  font: 12.5px var(--sans);
}
#plmenu button:hover { background: rgba(0, 0, 0, .06); }
@media (prefers-color-scheme: dark) {
  #plmenu button:hover { background: rgba(255, 255, 255, .06); }
}
#side header .n { font: 11px var(--mono); color: var(--muted); }
#drop {
  margin: 0 18px; padding: 10px 0 12px; border-bottom: 1px solid var(--hairline);
  color: var(--muted); font-size: 12.5px; cursor: pointer;
}
#drop:hover, #drop.hot { color: var(--ink); }
#drop::before { content: "+"; font-weight: 600; margin-right: 7px;
                color: var(--marker); }
#queue { flex: 1; overflow-y: auto; }
.row {
  position: relative; padding: 12px 18px 13px 18px; cursor: pointer;
  border-bottom: 1px solid var(--hairline); border-left: 3px solid transparent;
}
.row:hover { background: rgba(0, 0, 0, .035); }
@media (prefers-color-scheme: dark) { .row:hover { background: rgba(255,255,255,.04); } }
.row.playing { border-left-color: var(--marker); background: var(--marker-wash); }
.row.dragging { opacity: .4; }
.row.sel { background: rgba(245, 179, 1, .09); box-shadow: inset 0 0 0 1px
           rgba(245, 179, 1, .45); }
.row .t { font: 14px/1.4 var(--serif); }
.row .sub {
  margin-top: 4px; display: flex; align-items: baseline; gap: 8px;
  font-size: 11.5px; color: var(--muted);
}
.row .sub .cite { flex: 1; white-space: nowrap; overflow: hidden;
                  text-overflow: ellipsis; font-style: italic; }
.row .sub .dur, .row .sub .pct { font: 10.5px var(--mono); font-style: normal; }
.row .sub .pct { color: var(--marker); }
.row .bar {
  position: absolute; left: 18px; right: 18px; bottom: 0; height: 2px;
  background: transparent;
}
.row .bar i { display: block; height: 100%; background: var(--marker); }
.row .err { margin-top: 4px; font-size: 11px; color: var(--error); }
.row .acts { position: absolute; top: 10px; right: 12px; display: none; gap: 2px; }
.row:hover .acts { display: flex; }
.acts button {
  background: none; border: 0; color: var(--muted); width: 24px; height: 24px;
  border-radius: 5px; cursor: pointer; font-size: 13px;
}
.acts button:hover { color: var(--ink); background: rgba(0, 0, 0, .07); }
#side footer {
  padding: 12px 18px; border-top: 1px solid var(--hairline);
  font-size: 12px; color: var(--muted);
}
#side footer label { display: flex; align-items: center; gap: 7px; cursor: pointer; }
#autoadv { accent-color: var(--marker); }

#overlay {
  position: fixed; inset: 0; background: rgba(24, 23, 21, .72); display: none;
  place-items: center; z-index: 50; color: var(--marker);
  font: 600 20px var(--sans);
}
#overlay .inner {
  border: 3px dashed var(--marker); border-radius: 16px; padding: 40px 70px;
}
#overlay.show { display: grid; }
#toast {
  position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%);
  background: #B33; color: #fff; padding: 9px 16px; border-radius: 9px;
  font-size: 13px; display: none; z-index: 60;
}
:focus-visible { outline: 2px solid var(--marker); outline-offset: 2px; }
</style>
</head>
<body>
<div id="main">
  <div id="empty"><div>
    <div class="big">paper2audio</div><br>
    Drop a PDF anywhere to add it to the library.<br>
    Pick a paper from the queue to start listening.
  </div></div>
  <iframe id="frame" title="read-along view"></iframe>
</div>

<aside id="side">
  <header><h1 id="plTitle" title="Switch playlist">All papers ▾</h1>
    <span class="n" id="count"></span></header>
  <div id="drop">Drop PDFs or click to add</div>
  <input id="file" type="file" accept="application/pdf" multiple hidden>
  <div id="queue"></div>
  <footer>
    <label><input id="autoadv" type="checkbox"> Auto-advance</label>
  </footer>
</aside>

<div id="overlay"><div class="inner">Drop to add to library</div></div>
<div id="plmenu"></div>
<div id="toast"></div>

<script>
"use strict";
const $ = id => document.getElementById(id);
let state = { papers: {}, order: [], playlists: {}, settings: {} };
let currentId = null, dragId = null, dragAt = 0;
let activePl = localStorage.getItem("paper2audio.activePl") || null;
let selected = new Set(), lastIdx = null;

const jbody = obj => ({ headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(obj) });
function playlists() { return state.playlists || {}; }
function visibleIds() {
  if (activePl && playlists()[activePl]) {
    return playlists()[activePl].order.filter(id => state.papers[id]);
  }
  return state.order;
}
function setActivePl(plid) {
  selected.clear();
  lastIdx = null;
  activePl = plid && playlists()[plid] ? plid : null;
  if (activePl) localStorage.setItem("paper2audio.activePl", activePl);
  else localStorage.removeItem("paper2audio.activePl");
  render();
}
function showMenu(items, x, y) {
  const m = $("plmenu");
  m.innerHTML = "";
  for (const it of items) {
    const b = document.createElement("button");
    b.textContent = it.label;
    if (it.depth) b.style.paddingLeft = (12 + it.depth * 16) + "px";
    b.onclick = () => { m.style.display = "none"; it.action(); };
    m.appendChild(b);
  }
  m.style.display = "block";
  m.style.left = Math.min(x, innerWidth - 230) + "px";
  m.style.top = Math.min(y, innerHeight - m.offsetHeight - 10) + "px";
}
function playlistEntries() {
  // sorted so "Parent / Child" groups under "Parent", indented by depth
  return Object.entries(playlists())
    .sort((a, b) => a[1].name.localeCompare(b[1].name))
    .map(([plid, pl]) => {
      const segs = pl.name.split(" / ");
      return { plid, depth: segs.length - 1, label: segs[segs.length - 1] };
    });
}
addEventListener("pointerdown", e => {
  if (!$("plmenu").contains(e.target)) $("plmenu").style.display = "none";
});
async function newPlaylist(thenAdd) {
  const name = prompt("Playlist name:");
  if (!name) return;
  const r = await fetch("/api/playlists", { method: "POST", ...jbody({ name }) });
  const plid = (await r.json()).id;
  if (thenAdd) await fetch(`/api/playlists/${plid}/papers`,
                           { method: "POST", ...jbody({ id: thenAdd }) });
  else setActivePl(plid);
}

// ------------------------------------------------------------- rendering
function fmt(t) {
  if (t == null) return "";
  t = Math.round(t);
  const m = t / 60 | 0, s = t % 60;
  return m + ":" + String(s).padStart(2, "0");
}
function esc(s) { const d = document.createElement("div");
  d.textContent = s ?? ""; return d.innerHTML; }

function citation(p) {
  const names = (p.authors || "").split(",").map(s => s.trim()).filter(Boolean);
  const last = n => n.split(" ").pop();
  let c = names.length === 0 ? "" :
          names.length === 1 ? last(names[0]) :
          names.length === 2 ? `${last(names[0])} and ${last(names[1])}` :
          `${last(names[0])} et al.`;
  if (p.year) c = c ? `${c}, ${p.year}` : String(p.year);
  return c || p.filename || "";
}

function render() {
  const q = $("queue");
  const ids = visibleIds();
  const pl = activePl && playlists()[activePl];
  $("plTitle").textContent = (pl ? pl.name : "All papers") + " ▾";
  const ready = ids.filter(id => state.papers[id]?.status === "ready");
  $("count").textContent = ids.length ? `${ready.length}/${ids.length}` : "";
  q.innerHTML = "";
  for (const id of ids) {
    const p = state.papers[id];
    if (!p) continue;
    const row = document.createElement("div");
    row.className = "row" + (id === currentId ? " playing" : "")
                  + (selected.has(id) ? " sel" : "");
    row.draggable = true;
    row.dataset.id = id;
    const pct = Math.round((p.progress || 0) * 100);
    const status =
      p.status === "generating" ? `<span class="pct">${pct}%</span>` :
      p.status === "pending"    ? `<span class="dur">queued</span>` :
      p.status === "ready"      ? `<span class="dur">${fmt(p.duration)}</span>` : "";
    row.innerHTML = `
      <div class="t">${esc(p.title)}</div>
      <div class="sub"><span class="cite">${esc(citation(p))}</span>${status}</div>
      ${p.status === "generating"
        ? `<div class="bar"><i style="width:${pct}%"></i></div>` : ""}
      ${p.status === "error" ? `<div class="err">${esc(p.error)}</div>` : ""}
      <div class="acts">
        <button data-act="pl" title="Add to playlist">＋</button>
        <button data-act="regen" title="Regenerate">↻</button>
        <button data-act="del" title="${activePl
          ? "Remove from this playlist" : "Remove from library"}">✕</button>
      </div>`;
    q.appendChild(row);
  }
  $("empty").style.display = currentId ? "none" : "grid";
  $("frame").style.display = currentId ? "block" : "none";
  $("autoadv").checked = !!state.settings.auto_advance;
}

// ------------------------------------------------------------- playback
function play(id, autoplay) {
  const p = state.papers[id];
  if (!p || p.status !== "ready") return;
  currentId = id;
  const t = p.resume_t > 5 && p.resume_t < (p.duration || 1e9) - 10
            ? p.resume_t : 0;
  $("frame").src = `/view/${id}/index.html?embed=1&t=${t.toFixed(1)}` +
                   (autoplay ? "&autoplay=1" : "");
  render();
}
function nextReady(afterId) {
  const ids = visibleIds().filter(id => state.papers[id]?.status === "ready");
  const i = ids.indexOf(afterId);
  return i >= 0 && i + 1 < ids.length ? ids[i + 1] : null;
}
addEventListener("message", e => {
  const m = e.data;
  if (!m || m.source !== "paper2audio") return;
  if (m.type === "drag") { dragPing(); return; }
  if (m.type === "drop") { acceptFiles(m.files || []); return; }
  if (!currentId) return;
  if (m.type === "position") {
    fetch(`/api/papers/${currentId}/position`, { method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ t: m.t }) });
    if (state.papers[currentId]) state.papers[currentId].resume_t = m.t;
  } else if (m.type === "ended") {
    fetch(`/api/papers/${currentId}/position`, { method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ t: 0 }) });
    const next = state.settings.auto_advance && nextReady(currentId);
    if (next) play(next, true);
  }
});

// ------------------------------------------------------------- queue UI
$("queue").addEventListener("click", e => {
  const row = e.target.closest(".row");
  if (!row) return;
  const id = row.dataset.id, act = e.target.dataset.act;
  if (act === "del") {
    if (activePl) {
      fetch(`/api/playlists/${activePl}/papers/${id}`, { method: "DELETE" });
    } else if (confirm("Remove this paper (and its audio) from the library?")) {
      fetch(`/api/papers/${id}`, { method: "DELETE" })
        .then(r => { if (!r.ok) r.json().then(j => toast(j.detail));
                     if (id === currentId) { currentId = null; render(); } });
    }
  } else if (act === "pl") {
    const items = Object.entries(playlists()).map(([plid, pl]) => ({
      label: pl.name,
      action: () => fetch(`/api/playlists/${plid}/papers`,
                          { method: "POST", ...jbody({ id }) }),
    }));
    items.push({ label: "＋ New playlist…", action: () => newPlaylist(id) });
    showMenu(items, e.clientX, e.clientY);
  } else if (act === "regen") {
    const st = state.papers[id]?.status;
    if (st === "generating" || st === "pending") return;  // no ↻ spam
    fetch(`/api/papers/${id}/regenerate`, { method: "POST" });
  } else {
    const ids = visibleIds();
    if (e.shiftKey && lastIdx !== null) {       // range select
      const i = ids.indexOf(id);
      for (let k = Math.min(lastIdx, i); k <= Math.max(lastIdx, i); k++) {
        selected.add(ids[k]);
      }
      render();
      return;
    }
    if (e.ctrlKey || e.metaKey) {               // toggle select
      selected.has(id) ? selected.delete(id) : selected.add(id);
      lastIdx = ids.indexOf(id);
      render();
      return;
    }
    selected.clear();
    lastIdx = ids.indexOf(id);
    play(id, true);
  }
});
$("queue").addEventListener("mousedown", e => {
  if (e.shiftKey) e.preventDefault();  // no text selection on range-select
});
$("queue").addEventListener("contextmenu", e => {
  e.preventDefault();
  const row = e.target.closest(".row");
  if (row && !selected.has(row.dataset.id)) {
    selected.clear();
    selected.add(row.dataset.id);
    lastIdx = visibleIds().indexOf(row.dataset.id);
    render();
  }
  const n = selected.size, x = e.clientX, y = e.clientY;
  const items = [];
  if (n) {
    const noun = n > 1 ? `${n} papers` : "paper";
    items.push({ label: `Add ${noun} to playlist…`,
                 action: () => addToPlaylistMenu([...selected], x, y) });
    if (activePl) {
      items.push({ label: `Remove ${noun} from playlist`, action: () => {
        for (const id of selected) {
          fetch(`/api/playlists/${activePl}/papers/${id}`, { method: "DELETE" });
        }
        selected.clear();
      }});
    } else {
      items.push({ label: `Remove ${noun} from library…`, action: () => {
        if (!confirm(`Delete ${noun} (and audio) from the library?`)) return;
        for (const id of selected) {
          fetch(`/api/papers/${id}`, { method: "DELETE" });
          if (id === currentId) currentId = null;
        }
        selected.clear();
      }});
    }
    items.push({ label: `Regenerate ${noun}`, action: () => {
      for (const id of selected) {
        fetch(`/api/papers/${id}/regenerate`, { method: "POST" });
      }
    }});
  }
  items.push({ label: "Sort by…", action: () => sortMenu(x, y) });
  showMenu(items, x, y);
});
function addToPlaylistMenu(ids, x, y) {
  const add = plid => { for (const id of ids) {
    fetch(`/api/playlists/${plid}/papers`, { method: "POST", ...jbody({ id }) });
  } };
  const items = playlistEntries().map(en => ({
    label: en.label, depth: en.depth, action: () => add(en.plid) }));
  items.push({ label: "＋ New playlist…", action: async () => {
    const name = prompt("Playlist name:");
    if (!name) return;
    const r = await fetch("/api/playlists", { method: "POST", ...jbody({ name }) });
    add((await r.json()).id);
  }});
  showMenu(items, x, y);
}
function sortMenu(x, y) {
  const apply = cmp => {
    const ids = [...visibleIds()].sort(
      (a, b) => cmp(state.papers[a], state.papers[b]));
    if (activePl && playlists()[activePl]) {
      playlists()[activePl].order = ids;
      fetch(`/api/playlists/${activePl}`, { method: "PUT", ...jbody({ order: ids }) });
    } else {
      state.order = ids;
      fetch("/api/queue", { method: "PUT", ...jbody({ order: ids }) });
    }
    render();
  };
  const str = f => (a, b) =>
    String(f(a) ?? "").localeCompare(String(f(b) ?? ""));
  const desc = f => (a, b) => (f(b) ?? 0) - (f(a) ?? 0);
  showMenu([
    { label: "Sort by title", action: () => apply(str(p => p.title)) },
    { label: "Sort by first author", action: () => apply(str(p => p.authors)) },
    { label: "Sort by year (newest)", action: () => apply(desc(p => p.year)) },
    { label: "Sort by duration", action: () => apply(desc(p => p.duration)) },
    { label: "Sort by recently added", action: () => apply(desc(p => p.added)) },
  ], x, y);
}
$("queue").addEventListener("dragstart", e => {
  const row = e.target.closest(".row");
  if (row) { dragId = row.dataset.id; dragAt = Date.now();
             row.classList.add("dragging"); }
});
$("queue").addEventListener("dragover", e => {
  e.preventDefault();
  const over = e.target.closest(".row");
  const drag = document.querySelector(".row.dragging");
  if (!over || !drag || over === drag) return;
  const r = over.getBoundingClientRect();
  over.parentNode.insertBefore(drag,
    e.clientY < r.top + r.height / 2 ? over : over.nextSibling);
});
$("queue").addEventListener("dragend", () => {
  document.querySelector(".row.dragging")?.classList.remove("dragging");
  const order = [...document.querySelectorAll(".row")].map(c => c.dataset.id);
  if (activePl && playlists()[activePl]) {
    if (order.join() !== playlists()[activePl].order.join()) {
      playlists()[activePl].order = order;
      fetch(`/api/playlists/${activePl}`, { method: "PUT", ...jbody({ order }) });
    }
  } else if (order.join() !== state.order.join()) {
    state.order = order;
    fetch("/api/queue", { method: "PUT", ...jbody({ order }) });
  }
  dragId = null;
});
$("autoadv").addEventListener("change", () => {
  state.settings.auto_advance = $("autoadv").checked;
  fetch("/api/settings", { method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ auto_advance: $("autoadv").checked }) });
});

// ------------------------------------------------------------- uploads
function toast(msg) {
  $("toast").textContent = msg;
  $("toast").style.display = "block";
  setTimeout(() => $("toast").style.display = "none", 5000);
}
async function upload(files) {
  for (const f of files) {
    const fd = new FormData();
    fd.append("file", f, f.name);
    try {
      const r = await fetch("/api/papers", { method: "POST", body: fd });
      if (!r.ok) toast((await r.json()).detail || `upload failed: ${f.name}`);
    } catch { toast(`upload failed: ${f.name}`); }
  }
}
$("drop").onclick = () => $("file").click();
$("file").onchange = () => { upload([...$("file").files]); $("file").value = ""; };
// Overlay driven by drag "pings" from this page AND the embedded viewer
// (which forwards its drag events — they don't cross the iframe boundary).
// A stale-ping timeout replaces enter/leave counting, which double-counts
// when the overlay appears under the cursor.
let lastDrag = 0;
function dragPing() {
  lastDrag = Date.now();
  $("overlay").classList.add("show");
}
setInterval(() => {
  if (lastDrag && Date.now() - lastDrag > 700) {
    lastDrag = 0;
    $("overlay").classList.remove("show");
  }
}, 250);
function acceptFiles(files) {
  lastDrag = 0;
  $("overlay").classList.remove("show");
  const pdfs = [...files].filter(f => f.name.toLowerCase().endsWith(".pdf"));
  if (pdfs.length) upload(pdfs);
}
addEventListener("dragover", e => {
  e.preventDefault();
  if (e.dataTransfer?.types.includes("Files")) dragPing();
});
addEventListener("drop", e => { e.preventDefault(); acceptFiles(e.dataTransfer.files); });

// ------------------------------------------------------------- live state
$("plTitle").onclick = e => {
  const items = [{ label: "All papers", action: () => setActivePl(null) }];
  for (const en of playlistEntries()) {
    items.push({ label: en.label, depth: en.depth,
                 action: () => setActivePl(en.plid) });
  }
  items.push({ label: "＋ New playlist…", action: () => newPlaylist(null) });
  if (activePl) {
    items.push({ label: "✕ Delete this playlist", action: async () => {
      if (confirm("Delete this playlist? Papers stay in the library.")) {
        await fetch(`/api/playlists/${activePl}`, { method: "DELETE" });
        setActivePl(null);
      }
    }});
  }
  showMenu(items, e.clientX, e.clientY);
};

let pendingPlay = new URLSearchParams(location.search).get("play");
let pendingPl = new URLSearchParams(location.search).get("playlist");
function apply(snap) {
  state = snap;
  if (pendingPl) {  // deep link: playlist by id or name
    const byName = Object.keys(playlists()).find(k =>
      k === pendingPl ||
      playlists()[k].name.toLowerCase() === pendingPl.toLowerCase());
    if (byName) { activePl = byName;
                  localStorage.setItem("paper2audio.activePl", byName); }
    pendingPl = null;
  }
  if (pendingPlay && state.papers[pendingPlay]?.status === "ready") {
    const id = pendingPlay;      // deep link (?play=): start once ready
    pendingPlay = null;
    play(id, true);
  }
  // don't fight an in-progress drag — but a cancelled drag must not
  // freeze rendering forever, so the guard expires
  if (dragId && Date.now() - dragAt < 10000) return;
  dragId = null;
  render();
}
const es = new EventSource("/api/events");
es.onmessage = e => apply(JSON.parse(e.data));
fetch("/api/library").then(r => r.json()).then(snap => {
  apply(snap);
  if (currentId || pendingPlay) return;
  const first = visibleIds().find(id => snap.papers[id]?.status === "ready");
  if (first) play(first, false);   // open first ready paper, paused
});
</script>
</body>
