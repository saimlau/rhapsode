<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rhapsode library</title>
<style>
:root {
  --desk: #ECEAE6;
  --side: #E6E3DC;
  --ink: #2A2721;
  --muted: #8A857A;
  --hairline: rgba(40, 33, 20, .14);
  --marker: #F5B301;
  --marker-wash: rgba(245, 179, 1, .14);
  --error: #A33F35;
  --serif: "New York", "Iowan Old Style", Georgia, serif;
  --mono: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, monospace;
  --sans: system-ui, -apple-system, "Segoe UI", sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --desk: #1B1A18; --side: #22211E; --ink: #E6E2D8; --muted: #8E8A80;
    --hairline: rgba(255, 250, 235, .13); --marker-wash: rgba(245, 179, 1, .10);
    --error: #E09287;
  }
}
* { box-sizing: border-box; scrollbar-width: thin;
    scrollbar-color: rgba(40, 33, 20, .28) transparent; }
@media (prefers-color-scheme: dark) {
  * { scrollbar-color: rgba(255, 250, 235, .22) transparent; }
}
html, body { margin: 0; height: 100%; }
body { display: flex; flex-direction: column; background: var(--desk);
       font-family: var(--sans); color: var(--ink); }
.bar {
  display: flex; align-items: baseline; gap: 1.2rem;
  padding: .55rem 18px; border-bottom: 1px solid var(--hairline);
  flex: none;
}
.bar .mark { font-family: var(--serif); font-size: 1rem; }
.bar nav { margin-left: auto; display: flex; gap: 1.2rem; align-items: baseline; }
.bar a, .bar .out {
  font: 500 12.5px var(--sans); color: var(--muted); text-decoration: none;
  background: none; border: 0; padding: 0; cursor: pointer;
}
.bar a:hover, .bar .out:hover { color: var(--ink); }
.bar .here { color: var(--ink); box-shadow: inset 0 -6px 0 var(--marker-wash); }
#shell { display: flex; flex: 1; min-height: 0; }

#main { flex: 1; min-width: 0; position: relative; }
#frame { width: 100%; height: 100%; border: 0; display: none; }
#empty {
  height: 100%; display: grid; place-items: center; color: var(--muted);
  text-align: center; font-size: 14.5px; line-height: 1.8; padding: 40px;
}
#empty .big { font: 24px var(--serif); color: var(--ink); }

/* --------------------------------------------------- sidebar: journal ToC */
#side {
  width: 320px; flex: none; background: var(--side);
  border-left: 1px solid var(--hairline);
  display: flex; flex-direction: column;
}
#side header {
  padding: 18px 18px 10px; display: flex; align-items: baseline;
  justify-content: space-between;
}
#side header h1 {
  margin: 0; font: 600 11px var(--sans); letter-spacing: .14em;
  text-transform: uppercase; color: var(--muted); cursor: pointer;
  max-width: 220px; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis;
}
#side header h1:hover { color: var(--ink); }
#plmenu {
  position: fixed; display: none; z-index: 70; min-width: 210px;
  background: var(--side); color: var(--ink);
  border: 1px solid var(--hairline); border-radius: 10px; padding: 4px;
  box-shadow: 0 8px 30px rgba(0, 0, 0, .25);
}
#plmenu button {
  display: block; width: 100%; text-align: left; background: none; border: 0;
  color: inherit; padding: 8px 12px; border-radius: 7px; cursor: pointer;
  font: 12.5px var(--sans);
}
#plmenu button:hover { background: rgba(0, 0, 0, .06); }
@media (prefers-color-scheme: dark) {
  #plmenu button:hover { background: rgba(255, 255, 255, .06); }
}
#side header .n { font: 11px var(--mono); color: var(--muted); }
#find { padding: 0 18px 10px; }
#q {
  width: 100%; box-sizing: border-box; padding: 7px 10px;
  border: 1px solid var(--hairline); border-radius: 8px;
  background: var(--desk); color: var(--ink);
  font: 12.5px var(--sans);
}
#q::placeholder { color: var(--muted); }
#q:focus { outline: none; border-color: var(--marker);
           box-shadow: 0 0 0 2px var(--marker-wash); }
#q.on { border-color: var(--marker); }
/* the matched substring, highlighted with the same marker as spoken text */
.row .hit { background: var(--marker-wash); border-radius: 2px; }
#none {
  padding: 16px 18px; color: var(--muted); font-size: 12.5px; display: none;
}
#drop {
  margin: 0 18px; padding: 10px 0 12px; border-bottom: 1px solid var(--hairline);
  color: var(--muted); font-size: 12.5px; cursor: pointer;
}
#drop:hover, #drop.hot { color: var(--ink); }
#drop::before { content: "+"; font-weight: 600; margin-right: 7px;
                color: var(--marker); }
#queue { flex: 1; overflow-y: auto; }
.row {
  position: relative; padding: 12px 18px 13px 18px; cursor: pointer;
  border-bottom: 1px solid var(--hairline); border-left: 3px solid transparent;
}
.row:hover { background: rgba(0, 0, 0, .035); }
@media (prefers-color-scheme: dark) { .row:hover { background: rgba(255,255,255,.04); } }
.row.playing { border-left-color: var(--marker); background: var(--marker-wash); }
.row.dragging { opacity: .4; }
.row.sel { background: rgba(245, 179, 1, .09); box-shadow: inset 0 0 0 1px
           rgba(245, 179, 1, .45); }
.row .t { font: 14px/1.4 var(--serif); }
.row .sub {
  margin-top: 4px; display: flex; align-items: baseline; gap: 8px;
  font-size: 11.5px; color: var(--muted);
}
.row .sub .cite { flex: 1; white-space: nowrap; overflow: hidden;
                  text-overflow: ellipsis; font-style: italic; }
.row .sub .dur, .row .sub .pct { font: 10.5px var(--mono); font-style: normal; }
.row .sub .pct { color: var(--marker); }
.row .bar {
  position: absolute; left: 18px; right: 18px; bottom: 0; height: 2px;
  background: transparent;
}
.row .bar i { display: block; height: 100%; background: var(--marker); }
.row .err { margin-top: 4px; font-size: 11px; color: var(--error); }
.row .acts { position: absolute; top: 10px; right: 12px; display: none; gap: 2px; }
.row:hover .acts { display: flex; }
.acts button {
  background: none; border: 0; color: var(--muted); width: 24px; height: 24px;
  border-radius: 5px; cursor: pointer; font-size: 13px;
}
.acts button:hover { color: var(--ink); background: rgba(0, 0, 0, .07); }
#side footer {
  padding: 12px 18px; border-top: 1px solid var(--hairline);
  font-size: 12px; color: var(--muted);
}
#side footer { display: flex; align-items: center; justify-content: space-between; }
#side footer label { display: flex; align-items: center; gap: 7px; cursor: pointer; }
#dashLink { color: var(--muted); text-decoration: none; font-family: var(--mono);
            font-size: 11px; letter-spacing: .06em; }
#dashLink:hover { color: var(--ink); box-shadow: inset 0 -6px 0 var(--marker-wash); }
#autoadv { accent-color: var(--marker); }

#overlay {
  position: fixed; inset: 0; background: rgba(24, 23, 21, .72); display: none;
  place-items: center; z-index: 50; color: var(--marker);
  font: 600 20px var(--sans);
}
#overlay .inner {
  border: 3px dashed var(--marker); border-radius: 16px; padding: 40px 70px;
}
#overlay.show { display: grid; }
#toast {
  position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%);
  background: #B33; color: #fff; padding: 9px 16px; border-radius: 9px;
  font-size: 13px; display: none; z-index: 60;
}

/* in-page confirm/prompt: window.confirm/prompt are no-ops in Zotero's
   embedded browser, so the app can't rely on them */
.modal-ov {
  position: fixed; inset: 0; background: rgba(20, 18, 14, .45);
  display: grid; place-items: center; z-index: 100;
}
.modal {
  background: var(--side); color: var(--ink); border-radius: 12px;
  padding: 20px; width: min(360px, calc(100vw - 32px));
  box-shadow: 0 16px 48px rgba(0, 0, 0, .35);
  border: 1px solid var(--hairline);
}
.modal p { margin: 0 0 14px; font-size: 14px; line-height: 1.5; }
.modal input {
  width: 100%; box-sizing: border-box; margin-bottom: 14px; padding: 8px 10px;
  border: 1px solid var(--hairline); border-radius: 7px; font: 14px var(--sans);
  background: var(--desk); color: var(--ink);
}
.modal-row { display: flex; justify-content: flex-end; gap: 8px; }
.modal-row button {
  border: 0; border-radius: 7px; padding: 8px 16px; cursor: pointer;
  font: 13px var(--sans); background: rgba(0, 0, 0, .07); color: var(--ink);
}
@media (prefers-color-scheme: dark) {
  .modal-row button { background: rgba(255, 255, 255, .08); }
}
.modal-row button.pri { background: var(--marker); color: #201a05; font-weight: 600; }
:focus-visible { outline: 2px solid var(--marker); outline-offset: 2px; }
</style>
</head>
<body>
<div class="bar">
  <span class="mark">Rhapsode</span>
  <nav>
    <a href="/dashboard">Home</a>
    <a class="here" href="/">Library</a>
    <form method="post" action="/logout" style="display:inline">
      <button class="out" type="submit">Sign out</button>
    </form>
  </nav>
</div>
<div id="shell">
<div id="main">
  <div id="empty"><div>
    <div class="big">Rhapsode</div><br>
    Drop a PDF anywhere to add it to the library.<br>
    Pick a paper from the queue to start listening.
  </div></div>
  <iframe id="frame" title="read-along view"></iframe>
</div>

<aside id="side">
  <header><h1 id="plTitle" title="Switch playlist">All papers ▾</h1>
    <span class="n" id="count"></span></header>
  <div id="find">
    <input id="q" type="search" placeholder="Search titles and authors"
           autocomplete="off" spellcheck="false" aria-label="Search the library">
  </div>
  <div id="drop">Drop PDFs or click to add</div>
  <input id="file" type="file" accept="application/pdf" multiple hidden>
  <div id="queue"></div>
  <div id="none">No paper matches that.</div>
  <footer>
    <label><input id="autoadv" type="checkbox"> Auto-advance</label>
    <a id="dashLink" href="/dashboard">Dashboard</a>
  </footer>
</aside>
</div>

<div id="overlay"><div class="inner">Drop to add to library</div></div>
<div id="plmenu"></div>
<div id="toast"></div>

<script>
"use strict";
const $ = id => document.getElementById(id);
let state = { papers: {}, order: [], playlists: {}, settings: {} };
let currentId = null, dragId = null, dragAt = 0;
let activePl = localStorage.getItem("rhapsode.activePl") || localStorage.getItem("paper2audio.activePl") || null;
localStorage.removeItem("paper2audio.activePl");  // one-time migration
if (activePl) localStorage.setItem("rhapsode.activePl", activePl);
let selected = new Set(), lastIdx = null;

const jbody = obj => ({ headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(obj) });

// window.confirm/prompt are no-ops inside Zotero's embedded browser, so
// these promise-based in-page equivalents replace them everywhere
function _modal(build) {
  return new Promise(resolve => {
    const ov = document.createElement("div");
    ov.className = "modal-ov";
    const box = document.createElement("div");
    box.className = "modal";
    ov.appendChild(box);
    const close = v => { ov.remove();
                         document.removeEventListener("keydown", onKey);
                         resolve(v); };
    function onKey(e) {
      if (e.key === "Escape") close(build.cancel);
      else if (e.key === "Enter") close(build.enter());
    }
    build.render(box, close);
    ov.addEventListener("pointerdown", e => { if (e.target === ov) close(build.cancel); });
    document.addEventListener("keydown", onKey);
    document.body.appendChild(ov);
    build.focus && build.focus(box);
  });
}
function askConfirm(message, okLabel = "OK") {
  return _modal({
    cancel: false, enter: () => true,
    render(box, close) {
      const p = document.createElement("p"); p.textContent = message;
      const row = document.createElement("div"); row.className = "modal-row";
      const cancel = document.createElement("button"); cancel.textContent = "Cancel";
      const ok = document.createElement("button"); ok.textContent = okLabel;
      ok.className = "pri";
      cancel.onclick = () => close(false); ok.onclick = () => close(true);
      row.append(cancel, ok); box.append(p, row);
    },
  });
}
function askPrompt(message, def = "") {
  let input;
  return _modal({
    cancel: null, enter: () => input.value.trim() || null,
    render(box, close) {
      const p = document.createElement("p"); p.textContent = message;
      input = document.createElement("input"); input.type = "text"; input.value = def;
      const row = document.createElement("div"); row.className = "modal-row";
      const cancel = document.createElement("button"); cancel.textContent = "Cancel";
      const ok = document.createElement("button"); ok.textContent = "OK"; ok.className = "pri";
      cancel.onclick = () => close(null);
      ok.onclick = () => close(input.value.trim() || null);
      row.append(cancel, ok); box.append(p, input, row);
    },
    focus(box) { box.querySelector("input").focus(); },
  });
}
function playlists() { return state.playlists || {}; }
let query = "";                       // current search text, lowercased

function haystack(p) {
  return `${p.title || ""} ${p.authors || ""} ${p.year || ""} ${p.filename || ""}`
    .toLowerCase();
}

/* Highlight every occurrence of the query inside a title. Escapes first, then
   wraps matches, so the marks are the only markup that survives. */
function mark(text) {
  if (!query) return esc(text);
  const low = text.toLowerCase();
  let out = "", at = 0, i;
  while ((i = low.indexOf(query, at)) !== -1) {
    out += esc(text.slice(at, i)) +
           `<span class="hit">${esc(text.slice(i, i + query.length))}</span>`;
    at = i + query.length;
  }
  return out + esc(text.slice(at));
}

function visibleIds() {
  let ids;
  if (activePl && playlists()[activePl]) {
    ids = playlists()[activePl].order.filter(id => state.papers[id]);
  } else {
    ids = state.order;
  }
  // search narrows whatever the playlist already scoped
  if (query) {
    ids = ids.filter(id => state.papers[id] &&
                           haystack(state.papers[id]).includes(query));
  }
  return ids;
}
function setActivePl(plid) {
  selected.clear();
  lastIdx = null;
  activePl = plid && playlists()[plid] ? plid : null;
  if (activePl) localStorage.setItem("rhapsode.activePl", activePl);
  else localStorage.removeItem("rhapsode.activePl");
  render();
}
function showMenu(items, x, y) {
  const m = $("plmenu");
  m.innerHTML = "";
  for (const it of items) {
    const b = document.createElement("button");
    b.textContent = it.label;
    if (it.depth) b.style.paddingLeft = (12 + it.depth * 16) + "px";
    b.onclick = () => { m.style.display = "none"; it.action(); };
    m.appendChild(b);
  }
  m.style.display = "block";
  m.style.left = Math.min(x, innerWidth - 230) + "px";
  m.style.top = Math.min(y, innerHeight - m.offsetHeight - 10) + "px";
}
function playlistEntries() {
  // sorted so "Parent / Child" groups under "Parent", indented by depth
  return Object.entries(playlists())
    .sort((a, b) => a[1].name.localeCompare(b[1].name))
    .map(([plid, pl]) => {
      const segs = pl.name.split(" / ");
      return { plid, depth: segs.length - 1, label: segs[segs.length - 1] };
    });
}
addEventListener("pointerdown", e => {
  if (!$("plmenu").contains(e.target)) $("plmenu").style.display = "none";
});
async function newPlaylist(thenAdd) {
  const name = await askPrompt("Playlist name:");
  if (!name) return;
  const r = await fetch("/api/playlists", { method: "POST", ...jbody({ name }) });
  const plid = (await r.json()).id;
  if (thenAdd) await fetch(`/api/playlists/${plid}/papers`,
                           { method: "POST", ...jbody({ id: thenAdd }) });
  else setActivePl(plid);
}

// ------------------------------------------------------------- rendering
function fmt(t) {
  if (t == null) return "";
  t = Math.round(t);
  const m = t / 60 | 0, s = t % 60;
  return m + ":" + String(s).padStart(2, "0");
}
function esc(s) { const d = document.createElement("div");
  d.textContent = s ?? ""; return d.innerHTML; }

function citation(p) {
  const names = (p.authors || "").split(",").map(s => s.trim()).filter(Boolean);
  const last = n => n.split(" ").pop();
  let c = names.length === 0 ? "" :
          names.length === 1 ? last(names[0]) :
          names.length === 2 ? `${last(names[0])} and ${last(names[1])}` :
          `${last(names[0])} et al.`;
  if (p.year) c = c ? `${c}, ${p.year}` : String(p.year);
  return c || p.filename || "";
}

function render() {
  const q = $("queue");
  const ids = visibleIds();
  const pl = activePl && playlists()[activePl];
  $("plTitle").textContent = (pl ? pl.name : "All papers") + " ▾";
  const ready = ids.filter(id => state.papers[id]?.status === "ready");
  $("count").textContent = query
    ? `${ids.length} found`
    : (ids.length ? `${ready.length}/${ids.length}` : "");
  $("none").style.display = (query && !ids.length) ? "block" : "none";
  q.innerHTML = "";
  for (const id of ids) {
    const p = state.papers[id];
    if (!p) continue;
    const row = document.createElement("div");
    row.className = "row" + (id === currentId ? " playing" : "")
                  + (selected.has(id) ? " sel" : "");
    row.draggable = true;
    row.dataset.id = id;
    const pct = Math.round((p.progress || 0) * 100);
    // during extraction the bar legitimately sits at 0 % for minutes (a remote
    // model may be cold-starting), so name the stage rather than showing a
    // bare 0 % that reads as "stuck"
    const gen = pct > 0 ? `${p.stage || "working"} · ${pct}%`
                        : (p.stage || "starting…");
    const status =
      p.status === "generating" ? `<span class="pct">${esc(gen)}</span>` :
      p.status === "pending"    ? `<span class="dur">queued</span>` :
      p.status === "ready"      ? `<span class="dur">${fmt(p.duration)}</span>` : "";
    row.innerHTML = `
      <div class="t">${mark(p.title || "")}</div>
      <div class="sub"><span class="cite">${esc(citation(p))}</span>${status}</div>
      ${p.status === "generating"
        ? `<div class="bar"><i style="width:${pct}%"></i></div>` : ""}
      ${p.status === "error" ? `<div class="err">${esc(p.error)}</div>` : ""}
      <div class="acts">
        <button data-act="pl" title="Add to playlist">＋</button>
        <button data-act="regen" title="Regenerate">↻</button>
        <button data-act="del" title="${activePl
          ? "Remove from this playlist" : "Remove from library"}">✕</button>
      </div>`;
    q.appendChild(row);
  }
  $("empty").style.display = currentId ? "none" : "grid";
  $("frame").style.display = currentId ? "block" : "none";
  $("autoadv").checked = !!state.settings.auto_advance;
}

// ------------------------------------------------------------- playback
function play(id, autoplay) {
  const p = state.papers[id];
  if (!p || p.status !== "ready") return;
  currentId = id;
  const t = p.resume_t > 5 && p.resume_t < (p.duration || 1e9) - 10
            ? p.resume_t : 0;
  $("frame").src = `/view/${id}/index.html?embed=1&t=${t.toFixed(1)}` +
                   (autoplay ? "&autoplay=1" : "");
  render();
}
function nextReady(afterId) {
  const ids = visibleIds().filter(id => state.papers[id]?.status === "ready");
  const i = ids.indexOf(afterId);
  return i >= 0 && i + 1 < ids.length ? ids[i + 1] : null;
}
addEventListener("message", e => {
  const m = e.data;
  if (!m || (m.source !== "rhapsode" && m.source !== "paper2audio")) return;
  if (m.type === "drag") { dragPing(); return; }
  if (m.type === "drop") { acceptFiles(m.files || []); return; }
  if (!currentId) return;
  if (m.type === "position") {
    fetch(`/api/papers/${currentId}/position`, { method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ t: m.t }) });
    if (state.papers[currentId]) state.papers[currentId].resume_t = m.t;
  } else if (m.type === "ended") {
    fetch(`/api/papers/${currentId}/position`, { method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ t: 0 }) });
    const next = state.settings.auto_advance && nextReady(currentId);
    if (next) play(next, true);
  }
});

// ------------------------------------------------------------- queue UI
$("queue").addEventListener("click", async e => {
  const row = e.target.closest(".row");
  if (!row) return;
  const id = row.dataset.id, act = e.target.dataset.act;
  if (act === "del") {
    if (activePl) {
      fetch(`/api/playlists/${activePl}/papers/${id}`, { method: "DELETE" });
    } else if (await askConfirm("Remove this paper (and its audio) from "
                                + "the library?", "Remove")) {
      fetch(`/api/papers/${id}`, { method: "DELETE" })
        .then(r => { if (!r.ok) r.json().then(j => toast(j.detail));
                     if (id === currentId) { currentId = null; render(); } });
    }
  } else if (act === "pl") {
    const items = Object.entries(playlists()).map(([plid, pl]) => ({
      label: pl.name,
      action: () => fetch(`/api/playlists/${plid}/papers`,
                          { method: "POST", ...jbody({ id }) }),
    }));
    items.push({ label: "＋ New playlist…", action: () => newPlaylist(id) });
    showMenu(items, e.clientX, e.clientY);
  } else if (act === "regen") {
    const st = state.papers[id]?.status;
    if (st === "generating" || st === "pending") return;  // no ↻ spam
    fetch(`/api/papers/${id}/regenerate`, { method: "POST" });
  } else {
    const ids = visibleIds();
    if (e.shiftKey && lastIdx !== null) {       // range select
      const i = ids.indexOf(id);
      for (let k = Math.min(lastIdx, i); k <= Math.max(lastIdx, i); k++) {
        selected.add(ids[k]);
      }
      render();
      return;
    }
    if (e.ctrlKey || e.metaKey) {               // toggle select
      selected.has(id) ? selected.delete(id) : selected.add(id);
      lastIdx = ids.indexOf(id);
      render();
      return;
    }
    selected.clear();
    lastIdx = ids.indexOf(id);
    play(id, true);
  }
});
$("queue").addEventListener("mousedown", e => {
  if (e.shiftKey) e.preventDefault();  // no text selection on range-select
});
$("queue").addEventListener("contextmenu", e => {
  e.preventDefault();
  const row = e.target.closest(".row");
  if (row && !selected.has(row.dataset.id)) {
    selected.clear();
    selected.add(row.dataset.id);
    lastIdx = visibleIds().indexOf(row.dataset.id);
    render();
  }
  const n = selected.size, x = e.clientX, y = e.clientY;
  const items = [];
  if (n) {
    const noun = n > 1 ? `${n} papers` : "paper";
    items.push({ label: `Add ${noun} to playlist…`,
                 action: () => addToPlaylistMenu([...selected], x, y) });
    if (activePl) {
      items.push({ label: `Remove ${noun} from playlist`, action: () => {
        for (const id of selected) {
          fetch(`/api/playlists/${activePl}/papers/${id}`, { method: "DELETE" });
        }
        selected.clear();
      }});
    } else {
      items.push({ label: `Remove ${noun} from library…`, action: async () => {
        if (!(await askConfirm(`Delete ${noun} (and audio) from the library?`,
                               "Delete"))) return;
        for (const id of selected) {
          fetch(`/api/papers/${id}`, { method: "DELETE" });
          if (id === currentId) currentId = null;
        }
        selected.clear();
      }});
    }
    items.push({ label: `Regenerate ${noun}`, action: () => {
      for (const id of selected) {
        fetch(`/api/papers/${id}/regenerate`, { method: "POST" });
      }
    }});
  }
  items.push({ label: "Sort by…", action: () => sortMenu(x, y) });
  showMenu(items, x, y);
});
function addToPlaylistMenu(ids, x, y) {
  const add = plid => { for (const id of ids) {
    fetch(`/api/playlists/${plid}/papers`, { method: "POST", ...jbody({ id }) });
  } };
  const items = playlistEntries().map(en => ({
    label: en.label, depth: en.depth, action: () => add(en.plid) }));
  items.push({ label: "＋ New playlist…", action: async () => {
    const name = await askPrompt("Playlist name:");
    if (!name) return;
    const r = await fetch("/api/playlists", { method: "POST", ...jbody({ name }) });
    add((await r.json()).id);
  }});
  showMenu(items, x, y);
}
let lastSort = null;  // {key, dir} — picking the same sort again reverses it
function sortMenu(x, y) {
  const KEYS = [
    ["title", "title", "str"],
    ["first author", "authors", "str"],
    ["year", "year", "num"],
    ["duration", "duration", "num"],
    ["recently added", "added", "num"],
  ];
  const apply = (key, type) => {
    // strings default A→Z; numbers default descending (newest/longest first);
    // repeat selection flips the direction
    const dir = lastSort?.key === key ? -lastSort.dir
                                      : (type === "num" ? -1 : 1);
    lastSort = { key, dir };
    const val = id => state.papers[id]?.[key];
    const cmp = type === "str"
      ? (a, b) => dir * String(val(a) ?? "").localeCompare(String(val(b) ?? ""))
      : (a, b) => dir * ((val(a) ?? 0) - (val(b) ?? 0));
    const ids = [...visibleIds()].sort(cmp);
    if (activePl && playlists()[activePl]) {
      const pl = playlists()[activePl], before = pl.order;
      pl.order = spliceIntoFull(before, ids);
      sendOrder(`/api/playlists/${activePl}`, pl.order,
                () => { pl.order = before; });
    } else {
      const before = state.order;
      state.order = spliceIntoFull(before, ids);
      sendOrder("/api/queue", state.order, () => { state.order = before; });
    }
    render();
  };
  showMenu(KEYS.map(([label, key, type]) => ({
    label: "Sort by " + label + (lastSort?.key === key
      ? (lastSort.dir === 1 ? "  ↑ (pick again to flip)"
                            : "  ↓ (pick again to flip)")
      : ""),
    action: () => apply(key, type),
  })), x, y);
}
$("queue").addEventListener("dragstart", e => {
  const row = e.target.closest(".row");
  if (row) { dragId = row.dataset.id; dragAt = Date.now();
             row.classList.add("dragging"); }
});
$("queue").addEventListener("dragover", e => {
  e.preventDefault();
  const over = e.target.closest(".row");
  const drag = document.querySelector(".row.dragging");
  if (!over || !drag || over === drag) return;
  const r = over.getBoundingClientRect();
  over.parentNode.insertBefore(drag,
    e.clientY < r.top + r.height / 2 ? over : over.nextSibling);
});
/* Reordering while the search box has text used to send ONLY the matching
   rows as the whole order. The server rejects a partial list (400), but the
   page had already overwritten its own model and never checked the response,
   so every non-matching paper vanished from the UI until reload. Splice the
   moved subset back into the full order at the positions it occupied. */
function spliceIntoFull(fullOrder, subsetNewOrder) {
  const inSubset = new Set(subsetNewOrder);
  const it = subsetNewOrder[Symbol.iterator]();
  return fullOrder.map(id => inSubset.has(id) ? it.next().value : id);
}

/* A mutating write that silently failed left the page lying about the
   library. Check the status, say so, and resync from the server. */
function sendOrder(url, order, revert) {
  return fetch(url, { method: "PUT", ...jbody({ order }) })
    .then(r => { if (!r.ok) throw new Error(r.status); })
    .catch(() => {
      toast("Could not save the new order");
      revert();
      // resync from the server: never leave the page asserting an order the
      // server rejected
      fetch("/api/library").then(r => r.json()).then(apply).catch(() => {});
    });
}

$("queue").addEventListener("dragend", () => {
  document.querySelector(".row.dragging")?.classList.remove("dragging");
  const shown = [...document.querySelectorAll(".row")].map(c => c.dataset.id);
  if (activePl && playlists()[activePl]) {
    const pl = playlists()[activePl], before = pl.order;
    const order = spliceIntoFull(before, shown);
    if (order.join() !== before.join()) {
      pl.order = order;
      sendOrder(`/api/playlists/${activePl}`, order,
                () => { pl.order = before; });
    }
  } else {
    const before = state.order;
    const order = spliceIntoFull(before, shown);
    if (order.join() !== before.join()) {
      state.order = order;
      sendOrder("/api/queue", order, () => { state.order = before; });
    }
  }
  dragId = null;
});
// ------------------------------------------------------------- search
$("q").addEventListener("input", () => {
  query = $("q").value.trim().toLowerCase();
  $("q").classList.toggle("on", !!query);
  render();
});
$("q").addEventListener("keydown", e => {
  if (e.key === "Escape") {                 // clear without leaving the field
    e.stopPropagation();
    $("q").value = ""; query = ""; $("q").classList.remove("on"); render();
  } else if (e.key === "Enter") {           // play the top match
    const first = visibleIds().find(id => state.papers[id]?.status === "ready");
    if (first) play(first, true);
  }
});
// "/" focuses search from anywhere, the way a reader reaches for the index
document.addEventListener("keydown", e => {
  if (e.key === "/" && !/^(INPUT|TEXTAREA)$/.test(document.activeElement?.tagName)
      && !e.metaKey && !e.ctrlKey) {
    e.preventDefault();
    $("q").focus();
  }
});

$("autoadv").addEventListener("change", () => {
  state.settings.auto_advance = $("autoadv").checked;
  fetch("/api/settings", { method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ auto_advance: $("autoadv").checked }) });
});

// ------------------------------------------------------------- uploads
function toast(msg) {
  $("toast").textContent = msg;
  $("toast").style.display = "block";
  setTimeout(() => $("toast").style.display = "none", 5000);
}
async function upload(files) {
  for (const f of files) {
    const fd = new FormData();
    fd.append("file", f, f.name);
    try {
      const r = await fetch("/api/papers", { method: "POST", body: fd });
      if (!r.ok) toast((await r.json()).detail || `upload failed: ${f.name}`);
    } catch { toast(`upload failed: ${f.name}`); }
  }
}
$("drop").onclick = () => $("file").click();
$("file").onchange = () => { upload([...$("file").files]); $("file").value = ""; };
// Overlay driven by drag "pings" from this page AND the embedded viewer
// (which forwards its drag events — they don't cross the iframe boundary).
// A stale-ping timeout replaces enter/leave counting, which double-counts
// when the overlay appears under the cursor.
let lastDrag = 0;
function dragPing() {
  lastDrag = Date.now();
  $("overlay").classList.add("show");
}
setInterval(() => {
  if (lastDrag && Date.now() - lastDrag > 700) {
    lastDrag = 0;
    $("overlay").classList.remove("show");
  }
}, 250);
function acceptFiles(files) {
  lastDrag = 0;
  $("overlay").classList.remove("show");
  const pdfs = [...files].filter(f => f.name.toLowerCase().endsWith(".pdf"));
  if (pdfs.length) upload(pdfs);
}
addEventListener("dragover", e => {
  e.preventDefault();
  if (e.dataTransfer?.types.includes("Files")) dragPing();
});
addEventListener("drop", e => { e.preventDefault(); acceptFiles(e.dataTransfer.files); });

// ------------------------------------------------------------- live state
$("plTitle").onclick = e => {
  const items = [{ label: "All papers", action: () => setActivePl(null) }];
  for (const en of playlistEntries()) {
    items.push({ label: en.label, depth: en.depth,
                 action: () => setActivePl(en.plid) });
  }
  items.push({ label: "＋ New playlist…", action: () => newPlaylist(null) });
  if (activePl) {
    items.push({ label: "✕ Delete this playlist", action: async () => {
      if (!(await askConfirm("Delete this playlist? Papers stay in the "
                             + "library.", "Delete"))) return;
      const gone = activePl;
      const r = await fetch(`/api/playlists/${gone}`, { method: "DELETE" });
      if (!r.ok) { toast("Could not delete playlist"); return; }
      // prune locally so the change shows even if the SSE snapshot lags;
      // the next snapshot will confirm the same state
      delete state.playlists[gone];
      setActivePl(null);
    }});
  }
  showMenu(items, e.clientX, e.clientY);
};

let pendingPlay = new URLSearchParams(location.search).get("play");
let pendingPl = new URLSearchParams(location.search).get("playlist");
function apply(snap) {
  state = snap;
  if (activePl && !playlists()[activePl]) {
    // a playlist id left in localStorage from an old session (or deleted
    // in another tab) — drop it so its stale "Delete" option can't 404
    activePl = null;
    localStorage.removeItem("rhapsode.activePl");
  }
  if (pendingPl) {  // deep link: playlist by id or name
    const byName = Object.keys(playlists()).find(k =>
      k === pendingPl ||
      playlists()[k].name.toLowerCase() === pendingPl.toLowerCase());
    if (byName) { activePl = byName;
                  localStorage.setItem("rhapsode.activePl", byName); }
    pendingPl = null;
  }
  if (pendingPlay && state.papers[pendingPlay]?.status === "ready") {
    const id = pendingPlay;      // deep link (?play=): start once ready
    pendingPlay = null;
    play(id, true);
  }
  // don't fight an in-progress drag — but a cancelled drag must not
  // freeze rendering forever, so the guard expires
  if (dragId && Date.now() - dragAt < 10000) return;
  dragId = null;
  render();
}
const es = new EventSource("/api/events");
es.onmessage = e => apply(JSON.parse(e.data));
fetch("/api/library").then(r => r.json()).then(snap => {
  apply(snap);
  if (currentId || pendingPlay) return;
  const first = visibleIds().find(id => snap.papers[id]?.status === "ready");
  if (first) play(first, false);   // open first ready paper, paused
});
</script>
</body>
</html>
