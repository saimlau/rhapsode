<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rhapsode</title>
<style>
:root {
  --desk: #ECEAE6; --side: #E6E3DC; --ink: #2A2721; --muted: #8A857A;
  --hairline: rgba(40, 33, 20, .14);
  --marker: #F5B301; --marker-wash: rgba(245, 179, 1, .16);
  --error: #A33F35;
  --serif: "New York", "Iowan Old Style", Georgia, serif;
  --mono: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, monospace;
  --sans: system-ui, -apple-system, "Segoe UI", sans-serif;
  --page-shadow: 0 1px 2px rgba(40,33,20,.14), 0 6px 18px rgba(40,33,20,.10);
}
@media (prefers-color-scheme: dark) {
  :root {
    --desk: #1B1A18; --side: #22211E; --ink: #E6E2D8; --muted: #8E8A80;
    --hairline: rgba(255, 250, 235, .13); --marker-wash: rgba(245, 179, 1, .13);
    --error: #E09287;
    --page-shadow: 0 1px 2px rgba(0,0,0,.4), 0 6px 20px rgba(0,0,0,.35);
  }
}
:root[data-theme="dark"] {
  --desk: #1B1A18; --side: #22211E; --ink: #E6E2D8; --muted: #8E8A80;
  --hairline: rgba(255, 250, 235, .13); --marker-wash: rgba(245, 179, 1, .13);
  --error: #E09287; --page-shadow: 0 1px 2px rgba(0,0,0,.4), 0 6px 20px rgba(0,0,0,.35);
}
:root[data-theme="light"] {
  --desk: #ECEAE6; --side: #E6E3DC; --ink: #2A2721; --muted: #8A857A;
  --hairline: rgba(40, 33, 20, .14); --marker-wash: rgba(245, 179, 1, .16);
  --error: #A33F35; --page-shadow: 0 1px 2px rgba(40,33,20,.14), 0 6px 18px rgba(40,33,20,.10);
}
* { box-sizing: border-box; scrollbar-width: thin; }
body { margin: 0; background: var(--desk); color: var(--ink);
       font-family: var(--sans); line-height: 1.5; }
a { color: inherit; text-decoration: none; }

.bar { display: flex; align-items: baseline; gap: 1.2rem;
       padding: .85rem clamp(1rem, 4vw, 2.5rem); }
.bar .mark { font-family: var(--serif); font-size: 1.1rem; }
.bar nav { margin-left: auto; display: flex; gap: 1.2rem; align-items: baseline; }
.bar a, .bar button { font: 500 .8rem var(--sans); color: var(--muted);
  background: none; border: 0; padding: 0; cursor: pointer; }
.bar a:hover, .bar button:hover { color: var(--ink); }
.bar .here { color: var(--ink); box-shadow: inset 0 -6px 0 var(--marker-wash); }

main { max-width: 68rem; margin: 0 auto;
       padding: clamp(.4rem, 2vw, 1.4rem) clamp(1rem, 4vw, 2.5rem) 4rem; }

/* eyebrow: mono, the app's data voice */
.eyebrow { font: 600 .66rem var(--mono); letter-spacing: .16em;
  text-transform: uppercase; color: var(--muted); margin: 0 0 .8rem; }

/* ---------------------------------------------- A: the "pick up" hero */
.hero {
  display: grid; grid-template-columns: minmax(120px, 168px) 1fr; gap: clamp(1rem, 4vw, 2.2rem);
  background: var(--side); border: 1px solid var(--hairline);
  border-left: 3px solid var(--marker); border-radius: 14px;
  padding: clamp(1.1rem, 3vw, 1.8rem); align-items: center; margin-bottom: 2.6rem;
}
.hero .cover { position: relative; }
.hero .cover img {
  width: 100%; aspect-ratio: 1 / 1.29; object-fit: cover; object-position: top;
  border: 1px solid var(--hairline); border-radius: 3px; background: #fff;
  box-shadow: var(--page-shadow); display: block;
}
.hero .cover .under { position: absolute; left: 0; bottom: -1px; height: 3px;
  background: var(--marker); border-radius: 2px; }

.hero .body { min-width: 0; }
.hero h1 {
  margin: .35rem 0 .4rem; font: 500 clamp(1.4rem, 3.4vw, 2.15rem)/1.22 var(--serif);
  letter-spacing: -.01em; }
.hero .cite { font: .8rem var(--mono); color: var(--muted); margin: 0 0 .9rem; }
.hero .peek { font: italic 1.02rem/1.55 var(--serif); color: var(--muted);
  margin: 0 0 1.1rem; max-width: 52ch;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; }
/* SIGNATURE: a listening-progress line drawn as the reader's amber highlighter
   sweep — a wash track, a solid played fill, and a playhead notch at your spot */
.hero .track { position: relative; height: 8px; max-width: 40ch;
  background: var(--marker-wash); border-radius: 4px; margin: 0 0 1.1rem; }
.hero .track i { display: block; height: 100%; width: var(--fill, 0%);
  background: var(--marker); border-radius: 4px;
  transition: width 1s cubic-bezier(.22,.61,.36,1); }
.hero .track .head { position: absolute; top: -3px; left: var(--fill, 0%);
  width: 2px; height: 14px; background: var(--ink); transform: translateX(-1px);
  transition: left 1s cubic-bezier(.22,.61,.36,1); }
@media (prefers-reduced-motion: reduce) {
  .hero .track i, .hero .track .head { transition: none; } }
.hero .meta { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
.play {
  display: inline-flex; align-items: center; gap: .5rem;
  font: 600 .9rem var(--sans); color: var(--desk); background: var(--ink);
  border: 0; border-radius: 999px; padding: .6rem 1.2rem; cursor: pointer; }
.play:hover { background: #3b3730; }
@media (prefers-color-scheme: dark) { .play:hover { background: #d8d3c6; } }
.play .tri { font-size: .8em; }
.hero .left { font: .78rem var(--mono); color: var(--muted); }
.hero .left b { color: var(--marker); font-weight: 600; }

/* ---------------------------------------------- B: the cover wall */
.shelf-head { display: flex; align-items: baseline; justify-content: space-between;
  gap: 1rem; margin-bottom: .7rem; }
.shelf-head .count { font: .72rem var(--mono); color: var(--muted); }

/* C's idea, folded in: when several papers are in progress, a compact row
   under the hero — the hero is the one you're deepest into, this is the rest */
.continue { margin: -1rem 0 2.4rem; }
.continue h2 { margin: 0 0 .8rem; font: 600 .66rem var(--mono);
  letter-spacing: .16em; text-transform: uppercase; color: var(--muted); }
.crow { display: flex; gap: clamp(.9rem, 2vw, 1.2rem); overflow-x: auto;
  padding-bottom: .5rem; scroll-snap-type: x proximity; }
.crow .tile { flex: 0 0 auto; width: 116px; scroll-snap-align: start; }

/* C's facets, folded in: filters on the ONE wall, not duplicated carousels */
.chips { display: flex; gap: .5rem; flex-wrap: wrap; margin: 0 0 1.2rem; }
.chip { font: 500 .74rem var(--sans); color: var(--muted); background: none;
  border: 1px solid var(--hairline); border-radius: 999px; padding: .26rem .72rem;
  cursor: pointer; display: inline-flex; gap: .4rem; align-items: baseline; }
.chip:hover { color: var(--ink); }
.chip .cn { font: .68rem var(--mono); color: var(--muted); }
.chip.on { color: var(--ink); border-color: var(--marker);
  box-shadow: inset 0 -1.4em 0 var(--marker-wash); }
.chip.on .cn { color: var(--ink); }
/* your playlists, as grid-scoping groups after a toolbar divider */
.chip-div { width: 1px; align-self: stretch; min-height: 1.4rem;
  background: var(--hairline); margin: 0 .35rem; }
.chip.pl::before { content: "\2632"; margin-right: .4rem; color: var(--muted);
  font-size: .85em; }
.chip.pl.on::before { color: var(--ink); }

/* ---------------------------------------- the folder browser (By playlist) */
.crumb { display: flex; flex-wrap: wrap; gap: .2rem; align-items: center;
  margin: 0 0 1.3rem; font: .82rem var(--sans); }
.crumb .c { color: var(--muted); cursor: pointer; padding: .18rem .45rem;
  border-radius: 6px; }
.crumb .c:hover, .crumb .c.drop { color: var(--ink); background: var(--marker-wash); }
.crumb .c.cur { color: var(--ink); cursor: default; }
.crumb .sep { color: var(--muted); opacity: .55; }
.fsub { margin: 0 0 1.8rem; }
.fgrid { display: grid; gap: clamp(.9rem, 2.4vw, 1.3rem);
  grid-template-columns: repeat(auto-fill, minmax(128px, 1fr)); }
/* a manila folder tab in the desk surface, not an emoji */
.folder { display: flex; flex-direction: column; cursor: pointer; }
.folder .box { position: relative; aspect-ratio: 1 / .74; margin-top: 11px;
  background: var(--side); border: 1px solid var(--hairline);
  border-radius: 1px 8px 8px 8px;
  transition: transform .15s ease, border-color .15s ease, background .15s ease; }
.folder .box::before { content: ""; position: absolute; top: -10px; left: -1px;
  width: 46%; height: 13px; background: var(--side);
  border: 1px solid var(--hairline); border-bottom: none;
  border-radius: 6px 8px 0 0; }
.folder .box .cnt { position: absolute; right: .5rem; bottom: .45rem;
  font: .7rem var(--mono); color: var(--muted); }
.folder:hover .box { transform: translateY(-2px); }
.folder.drop .box { border-color: var(--marker); background: var(--marker-wash);
  transform: translateY(-2px); }
.folder .fn { margin-top: .55rem; font: .84rem/1.25 var(--serif); color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; }
.newf { margin-top: 11px; aspect-ratio: 1 / .74; border: 1px dashed var(--hairline);
  border-radius: 8px; background: none; color: var(--muted); cursor: pointer;
  font: .82rem var(--sans); display: flex; align-items: center;
  justify-content: center; }
.newf:hover { color: var(--ink); border-color: var(--marker); }
.fpapers .tile { cursor: grab; }
.fpapers .tile.dragging { opacity: .4; }
.fhint { font: .74rem var(--mono); color: var(--muted); margin: 0 0 .9rem; }
#folders[hidden] { display: none; }
/* .wall sets display:grid, which beats the UA [hidden] rule, so the
   grid stayed visible under the folder view — restore it explicitly */
.wall[hidden] { display: none; }
#toast { position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%);
  background: var(--ink); color: var(--desk); padding: .55rem 1rem;
  border-radius: 8px; font: .82rem var(--sans); opacity: 0; pointer-events: none;
  transition: opacity .2s ease; z-index: 60; }
#toast.show { opacity: 1; }
.wall { display: grid; gap: clamp(.9rem, 2.4vw, 1.4rem);
  grid-template-columns: repeat(auto-fill, minmax(128px, 1fr)); }
.tile { position: relative; display: block; }
.tile .frame { position: relative; overflow: hidden; border-radius: 3px;
  box-shadow: var(--page-shadow); background: #fff;
  transition: transform .18s ease, box-shadow .18s ease; }
.tile:hover .frame, .tile:focus-visible .frame {
  transform: translateY(-3px); box-shadow: 0 3px 6px rgba(40,33,20,.16), 0 14px 30px rgba(40,33,20,.16); }
.tile img { width: 100%; aspect-ratio: 1 / 1.29; object-fit: cover;
  object-position: top; display: block; border: 1px solid var(--hairline);
  border-radius: 3px; }
/* progress underline — the same amber, stronger for in-progress papers */
.tile .prog { position: absolute; left: 0; bottom: 0; height: 3px;
  background: var(--marker); }
/* D: the opening line, revealed on hover over the cover */
.tile .peek {
  position: absolute; inset: 0; padding: .7rem; border-radius: 3px;
  background: linear-gradient(rgba(24,23,21,.04), rgba(24,23,21,.86) 55%);
  color: #F3EFE6; font: italic .82rem/1.45 var(--serif);
  display: flex; align-items: flex-end; opacity: 0; transition: opacity .18s ease;
  overflow: hidden; }
.tile:hover .peek, .tile:focus-visible .peek { opacity: 1; }
@media (hover: none) { .tile .peek { display: none; } }
.tile .cap { margin-top: .5rem; }
.tile .cap .t { font: .82rem/1.28 var(--serif); color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.tile .cap .c { margin-top: .15rem; font: .68rem var(--mono); color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tile .cap .c .n { color: var(--marker); }

/* footer strip: the machinery + anything failed, deliberately quiet */
.strip { display: flex; flex-wrap: wrap; gap: 1.4rem 2.4rem; margin-top: 2.8rem;
  padding-top: 1.2rem; border-top: 1px solid var(--hairline);
  font: .76rem var(--mono); color: var(--muted); }
.strip .k { color: var(--ink); }
.strip .bad a { color: var(--error); }
.lede { font-family: var(--serif); font-size: clamp(1.5rem, 3.6vw, 2rem);
  font-weight: 500; margin: .4rem 0 1.8rem; letter-spacing: -.01em; max-width: 30ch; }
.lede b { font-weight: 500; box-shadow: inset 0 -.34em 0 var(--marker-wash); }
.empty { color: var(--muted); font-size: .9rem; }
.empty a { color: inherit; box-shadow: inset 0 -.4em 0 var(--marker-wash); }

@media (max-width: 560px) {
  .hero { grid-template-columns: 84px 1fr; gap: 1rem; }
  .hero .peek { display: none; }
}
:focus-visible { outline: 2px solid var(--marker); outline-offset: 3px; }
</style>

<div class="bar">
  <span class="mark">Rhapsode</span>
  <nav>
    <a class="here" href="/dashboard">Home</a>
    <a href="/">Library</a>
    <a id="peopleLink" href="/admin" hidden>People</a>
    <form method="post" action="/logout" style="display:inline">
      <button type="submit">Sign out</button>
    </form>
  </nav>
</div>

<main>
  <div id="top"><p class="lede">Reading the shelf…</p></div>

  <section class="continue" id="continue" hidden>
    <h2>Also in progress</h2>
    <div class="crow" id="crow"></div>
  </section>

  <section id="shelfSection" hidden>
    <div class="shelf-head">
      <p class="eyebrow" style="margin:0">The shelf</p>
      <span class="count" id="shelfCount"></span>
    </div>
    <div class="chips" id="chips"></div>
    <div class="wall" id="wall"></div>
    <div id="folders" hidden></div>
  </section>

  <div class="strip" id="strip"></div>
</main>
<div id="toast"></div>

<script>
const $ = s => document.querySelector(s);
const esc = s => String(s ?? "").replace(/[&<>"]/g,
  c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
// open inside the library shell (sidebar + reader), resuming at the saved
// position — NOT the bare /view reader, which has no navigation
const view = id => `/?play=${encodeURIComponent(id)}`;
const cover = id => `/view/${encodeURIComponent(id)}/page-000.png`;

function clock(s) {
  s = Math.max(0, Math.round(s || 0));
  const h = Math.floor(s / 3600), m = Math.floor(s % 3600 / 60);
  return h ? `${h}h ${String(m).padStart(2, "0")}m` : `${m}m`;
}
function cite(p) {
  const names = (p.authors || "").split(",").map(x => x.trim()).filter(Boolean);
  const last = n => n.split(" ").pop();
  let c = names.length === 0 ? "" : names.length === 1 ? last(names[0])
        : names.length === 2 ? `${last(names[0])} & ${last(names[1])}`
        : `${last(names[0])} et al.`;
  if (p.year) c = c ? `${c} · ${p.year}` : String(p.year);
  return c;
}
const frac = p => p.duration ? Math.min(1, (p.at || 0) / p.duration) : 0;

/* the opening line, fetched once per paper and cached, for the hover peek */
const peeks = {};
async function peek(id, el) {
  if (peeks[id] !== undefined) { el.textContent = peeks[id]; return; }
  try {
    const r = await fetch(`/api/papers/${encodeURIComponent(id)}/preview`);
    peeks[id] = (await r.json()).text || "";
  } catch { peeks[id] = ""; }
  el.textContent = peeks[id];
}

function hero(p) {
  const pct = Math.round(frac(p) * 100);
  const left = Math.max(0, (p.duration || 0) - (p.at || 0));
  const top = $("#top");
  top.innerHTML = `
    <p class="eyebrow">Pick up where you left off</p>
    <div class="hero">
      <a class="cover" href="${view(p.id)}" aria-label="Resume ${esc(p.title)}">
        <img src="${cover(p.id)}" alt="" onerror="this.style.visibility='hidden'">
        <span class="under" style="width:${pct}%"></span>
      </a>
      <div class="body">
        <h1>${esc(p.title)}</h1>
        <p class="cite">${esc(cite(p))}</p>
        <p class="peek" id="heroPeek"></p>
        <div class="track" style="--fill:0%"><i></i><span class="head"></span></div>
        <div class="meta">
          <a class="play" href="${view(p.id)}"><span class="tri">▶</span> Resume</a>
          <span class="left"><b>${clock(left)}</b> left · ${pct}%</span>
        </div>
      </div>
    </div>`;
  peek(p.id, $("#heroPeek"));
}

function startFresh(d) {
  const first = d.shelf[0];
  $("#top").innerHTML = first
    ? `<p class="lede"><b>${d.stats.papers}</b> papers, <b>${d.stats.hours}</b> hours.
         Nothing started yet — <a href="${view(first.id)}">open the newest</a>.</p>`
    : `<p class="lede">The shelf is empty. <a href="/">Drop a PDF</a> to begin.</p>`;
}

function tileHTML(p) {
  const pct = Math.round(frac(p) * 100);
  return `<a class="tile" href="${view(p.id)}" data-id="${esc(p.id)}">
    <div class="frame">
      <img src="${cover(p.id)}" alt="" loading="lazy"
           onerror="this.style.visibility='hidden'">
      ${pct ? `<span class="prog" style="width:${pct}%"></span>` : ""}
      <div class="peek"><span></span></div>
    </div>
    <div class="cap">
      <div class="t">${esc(p.title)}</div>
      <div class="c">${pct ? `<span class="n">${pct}%</span> · ` : ""}${esc(cite(p) || clock(p.duration))}</div>
    </div>
  </a>`;
}
// wire the lazy opening-line peek on a container of tiles
function wirePeek(root) {
  root.querySelectorAll(".tile").forEach(t => {
    const go = () => peek(t.dataset.id, t.querySelector(".peek span"));
    t.addEventListener("pointerenter", go, { once: true });
    t.addEventListener("focus", go, { once: true });
  });
}

const inProgress = p => frac(p) > 0.02 && frac(p) < 0.98;
// C's facets, as filters on the one wall
const FILTERS = [
  { key: "all",   label: "All",   fn: s => s, whole: true },
  { key: "prog",  label: "In progress", fn: s => s.filter(inProgress) },
  { key: "short", label: "Short",
    fn: s => s.filter(p => (p.duration || 0) > 0 && p.duration < 1200)
              .sort((a, b) => a.duration - b.duration) },
  { key: "long",  label: "Long",
    fn: s => s.filter(p => (p.duration || 0) >= 3000)
              .sort((a, b) => b.duration - a.duration) },
  { key: "year",  label: "By year", whole: true,
    fn: s => [...s].sort((a, b) => (b.year || 0) - (a.year || 0)) },
];
let activeFilter = "all";
let PLAYLISTS = [], SHELF = [], BYID = {};
let currentFolder = null;              // folder browser location: plid or null

const jbody = o => ({ headers: { "Content-Type": "application/json" },
                      body: JSON.stringify(o) });
let toastT;
function toast(m) {
  const t = $("#toast"); t.textContent = m; t.classList.add("show");
  clearTimeout(toastT); toastT = setTimeout(() => t.classList.remove("show"), 2400);
}

function filtered(shelf) {
  return (FILTERS.find(f => f.key === activeFilter) || FILTERS[0]).fn(shelf);
}

function chips(shelf) {
  const facets = FILTERS.map(f => {
    const n = f.fn(shelf).length;
    const badge = f.whole ? "" : `<span class="cn">${n}</span>`;
    return n ? `<button class="chip${f.key === activeFilter ? " on" : ""}"
      data-k="${f.key}">${f.label}${badge}</button>` : "";
  }).join("");
  const byPl = PLAYLISTS.length
    ? `<span class="chip-div"></span><button class="chip${activeFilter === "folders" ? " on" : ""}"
        data-k="folders">By playlist</button>` : "";
  $("#chips").innerHTML = facets + byPl;
  $("#chips").querySelectorAll(".chip").forEach(c =>
    c.addEventListener("click", () => { activeFilter = c.dataset.k; showView(); }));
}

function showView() {
  const folders = activeFilter === "folders";
  $("#wall").hidden = folders;
  $("#folders").hidden = !folders;
  chips(SHELF);
  if (folders) renderFolders(); else wall(SHELF);
}

function wall(shelf) {
  $("#shelfCount").textContent = `${shelf.length} paper${shelf.length === 1 ? "" : "s"}`;
  $("#wall").innerHTML = filtered(shelf).map(tileHTML).join("");
  wirePeek($("#wall"));
}

function continueRow(items) {
  $("#continue").hidden = items.length < 1;
  if (!items.length) return;
  $("#crow").innerHTML = items.map(tileHTML).join("");
  wirePeek($("#crow"));
}

// ------------------------------------------------------- folder browser
const childrenOf = plid => PLAYLISTS.filter(p => (p.parent || null) === (plid || null));
const folderById = plid => PLAYLISTS.find(p => p.id === plid);
function folderPath(plid) {
  const out = []; let cur = plid;
  while (cur) { const f = folderById(cur); if (!f) break; out.unshift(f); cur = f.parent || null; }
  return out;
}
const papersOf = plid => (folderById(plid)?.order || []).map(id => BYID[id]).filter(Boolean);
function unfiled() {
  const inAny = new Set(PLAYLISTS.flatMap(p => p.order));
  return SHELF.filter(c => !inAny.has(c.id));
}

function renderFolders() {
  const path = folderPath(currentFolder);
  const subs = childrenOf(currentFolder);
  const papers = currentFolder ? papersOf(currentFolder) : unfiled();
  const crumbs =
    `<span class="c${currentFolder ? "" : " cur"}" data-f="">All folders</span>` +
    path.map((f, i) => `<span class="sep">\u203A</span>`
      + `<span class="c${i === path.length - 1 ? " cur" : ""}" data-f="${esc(f.id)}">${esc(f.name)}</span>`
    ).join("");
  const grid = `<div class="fsub"><div class="fgrid">` + subs.map(f => {
      const n = f.order.length + childrenOf(f.id).length;
      return `<div class="folder" data-f="${esc(f.id)}" title="${esc(f.name)}">
        <div class="box"><span class="cnt">${n || ""}</span></div>
        <div class="fn">${esc(f.name)}</div></div>`;
    }).join("") + `<button class="newf" id="newf">+ New folder</button></div></div>`;
  const label = currentFolder ? "papers here" : "papers not in any folder";
  const papersBlock = `<p class="fhint">${papers.length
      ? papers.length + " " + label + " \u00b7 drag a paper onto a folder to move it, drop a PDF to add one"
      : "no " + label}</p>
    <div class="wall fpapers" id="fpapers">${papers.map(paperTile).join("")}</div>`;
  $("#folders").innerHTML = `<div class="crumb">${crumbs}</div>${grid}${papersBlock}`;
  wireFolders();
}

const paperTile = p => tileHTML(p).replace('<a class="tile"', '<a class="tile" draggable="true"');

function wireFolders() {
  $("#folders").querySelectorAll(".crumb .c").forEach(c =>
    c.addEventListener("click", () => { currentFolder = c.dataset.f || null; renderFolders(); }));
  $("#folders").querySelectorAll(".folder").forEach(f =>
    f.addEventListener("click", () => { currentFolder = f.dataset.f; renderFolders(); }));
  $("#newf")?.addEventListener("click", newFolder);
  wirePeek($("#fpapers"));

  let dragPid = null;
  $("#fpapers").querySelectorAll(".tile").forEach(t => {
    t.addEventListener("dragstart", e => {
      dragPid = t.dataset.id; t.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
      e.dataTransfer.setData("text/plain", t.dataset.id);
    });
    t.addEventListener("dragend", () => { dragPid = null; t.classList.remove("dragging"); });
  });

  const targets = [...$("#folders").querySelectorAll(".folder")].map(el => [el, el.dataset.f])
    .concat([...$("#folders").querySelectorAll(".crumb .c")].map(el => [el, el.dataset.f || null]));
  for (const [el, dest] of targets) {
    el.addEventListener("dragover", e => { e.preventDefault(); el.classList.add("drop"); });
    el.addEventListener("dragleave", () => el.classList.remove("drop"));
    el.addEventListener("drop", async e => {
      e.preventDefault(); el.classList.remove("drop");
      if (e.dataTransfer.files?.length) return uploadInto(dest, e.dataTransfer.files);
      const pid = e.dataTransfer.getData("text/plain") || dragPid;
      if (pid) moveInto(pid, dest);
    });
  }
}

async function moveInto(pid, dest) {
  try {
    if (dest) await fetch(`/api/playlists/${dest}/papers`, { method: "POST", ...jbody({ id: pid }) });
    if (currentFolder && currentFolder !== dest)
      await fetch(`/api/playlists/${currentFolder}/papers/${encodeURIComponent(pid)}`,
                  { method: "DELETE" });
    await reload();
  } catch { toast("Could not move that paper"); }
}
async function uploadInto(dest, files) {
  let n = 0;
  for (const file of files) {
    if (file.type !== "application/pdf" && !/\.pdf$/i.test(file.name)) continue;
    const fd = new FormData(); fd.append("file", file);
    if (dest) fd.append("playlist_id", dest);
    try { await fetch("/api/papers", { method: "POST", body: fd }); n++; }
    catch { toast("Upload failed"); }
  }
  if (n) { toast(`Added ${n} paper${n === 1 ? "" : "s"}`); await reload(); }
}
async function newFolder() {
  const name = (prompt("New folder name") || "").trim();
  if (!name || name.includes("/")) return;
  try { await fetch("/api/playlists", { method: "POST", ...jbody({ name, parent: currentFolder }) }); }
  catch { toast("Could not create the folder"); }
  await reload();
}

async function reload() {
  const [dash, me] = await Promise.all([
    fetch("/api/dashboard").then(r => r.ok ? r.json() : Promise.reject()),
    fetch("/api/me").then(r => r.ok ? r.json() : null).catch(() => null),
  ]);
  render({ ...dash, me });
}

function strip(d) {
  const m = d.machinery, bad = d.failed || [];
  const bits = [
    `<span><span class="k">voice</span> ${esc(m.voice)}</span>`,
    `<span><span class="k">extraction</span> ${esc(m.extraction)}</span>`,
    m.free_gb != null ? `<span><span class="k">disk</span> ${m.free_gb} GB free</span>` : "",
    d.queued ? `<span><span class="k">queue</span> ${d.queued} waiting</span>` : "",
    bad.length ? `<span class="bad"><span class="k" style="color:var(--error)">needs attention</span>
      <a href="/">${esc(bad[0].title)}${bad.length > 1 ? ` +${bad.length - 1}` : ""}</a></span>` : "",
  ];
  $("#strip").innerHTML = bits.filter(Boolean).join("");
}

function render(d) {
  if (d.me && d.me.admin) $("#peopleLink").hidden = false;
  const prog = (d.resume || []);
  if (prog.length) hero(prog[0]); else startFresh(d);
  continueRow(prog.slice(1));
  PLAYLISTS = d.playlists || [];
  SHELF = d.shelf || [];
  BYID = Object.fromEntries(SHELF.map(c => [c.id, c]));
  $("#shelfSection").hidden = !SHELF.length;
  if (SHELF.length) showView();
  strip(d);
  const g = d.resume && d.resume[0];
  if (g) requestAnimationFrame(() => {
    const t = $(".hero .track"); if (t) {
      const p = g.duration ? Math.min(100, Math.round((g.at||0)/g.duration*100)) : 0;
      t.style.setProperty("--fill", p + "%");
    }
  });
}

async function load() {
  try {
    const [dash, me] = await Promise.all([
      fetch("/api/dashboard").then(r => r.status === 401 ? Promise.reject("401") : r.json()),
      fetch("/api/me").then(r => r.ok ? r.json() : null).catch(() => null),
    ]);
    render({ ...dash, me });
  } catch (e) {
    if (e === "401") location.href = "/login";
  }
}
load();
</script>
