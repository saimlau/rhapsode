<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rhapsode</title>
<style>
:root {
  --desk: #ECEAE6; --side: #E6E3DC; --ink: #2A2721; --muted: #8A857A;
  --hairline: rgba(40, 33, 20, .14);
  --marker: #F5B301; --marker-wash: rgba(245, 179, 1, .14);
  --error: #A33F35;
  --serif: "New York", "Iowan Old Style", Georgia, serif;
  --mono: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, monospace;
  --sans: system-ui, -apple-system, "Segoe UI", sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --desk: #1B1A18; --side: #22211E; --ink: #E6E2D8; --muted: #8E8A80;
    --hairline: rgba(255, 250, 235, .13); --marker-wash: rgba(245, 179, 1, .10);
    --error: #E09287;
  }
}
* { box-sizing: border-box; scrollbar-width: thin; }
body {
  margin: 0; background: var(--desk); color: var(--ink);
  font-family: var(--sans); line-height: 1.5;
}
a { color: inherit; }

.bar {
  display: flex; align-items: baseline; gap: 1.2rem;
  padding: .85rem clamp(1rem, 4vw, 2.5rem);
}
.bar .mark { font-family: var(--serif); font-size: 1.1rem; }
.bar nav { margin-left: auto; display: flex; gap: 1.2rem; align-items: baseline; }
.bar a, .bar button {
  font: 500 .8rem var(--sans); color: var(--muted); text-decoration: none;
  background: none; border: 0; padding: 0; cursor: pointer;
}
.bar a:hover, .bar button:hover { color: var(--ink); }
.bar .here { color: var(--ink);
  box-shadow: inset 0 -6px 0 var(--marker-wash); }

main {
  max-width: 62rem; margin: 0 auto;
  padding: clamp(.6rem, 3vw, 2rem) clamp(1rem, 4vw, 2.5rem) 3rem;
}

.lede {
  font-family: var(--serif); font-size: clamp(1.45rem, 3.6vw, 2.1rem);
  line-height: 1.3; margin: .6rem 0 .3rem; font-weight: 500;
  letter-spacing: -.01em; max-width: 34ch;
}
.lede b { font-weight: 500; box-shadow: inset 0 -.36em 0 var(--marker-wash); }
.sub { color: var(--muted); font-size: .84rem; margin: 0 0 1.8rem; }

.grid { display: grid; gap: 1rem; grid-template-columns: 1fr; }
/* fr tracks size as minmax(auto, fr): one nowrap row would otherwise blow the
   track out past main's edge instead of ellipsizing */
.grid > *, .card, .rows li { min-width: 0; }
@media (min-width: 860px) {
  .grid { grid-template-columns: 1.55fr 1fr; align-items: start; }
  .col { display: grid; gap: 1rem; }
}
@media (max-width: 859.9px) { .col { display: contents; } }

/* content lives on cards, the same surface as the library's sidebar */
.card {
  background: var(--side); border: 1px solid var(--hairline);
  border-radius: 12px; padding: 1rem 1.15rem 1.1rem;
}
.card h2 {
  margin: 0 0 .7rem; font: 600 .68rem var(--sans);
  letter-spacing: .13em; text-transform: uppercase; color: var(--muted);
}

/* SIGNATURE: the generating paper's title fills with the same amber wash the
   reader uses to track a spoken sentence */
.card.making { border-left: 3px solid var(--marker); }
.making .t {
  font-family: var(--serif); font-size: 1.1rem; line-height: 1.5;
  display: inline; background-image: linear-gradient(var(--marker-wash), var(--marker-wash)),
    linear-gradient(var(--marker), var(--marker));
  background-repeat: no-repeat, no-repeat;
  background-size: 100% 100%, var(--fill, 0%) .22em;
  background-position: 0 0, 0 100%;
  transition: background-size .6s ease; border-radius: 2px;
  padding: .05em .15em;
}
@media (prefers-reduced-motion: reduce) { .making .t { transition: none; } }
.making .meta {
  font: .74rem var(--mono); color: var(--muted); margin-top: .6rem;
  display: flex; gap: 1rem; flex-wrap: wrap;
}
.making .meta .pct { color: var(--marker); }

.rows { list-style: none; margin: 0; padding: 0; }
.rows li { display: flex; gap: .8rem; align-items: baseline; padding: .5rem 0; }
.rows li + li { border-top: 1px solid var(--hairline); }
.rows a {
  text-decoration: none; flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  font-family: var(--serif); font-size: .95rem;
}
.rows a::before { content: "▸ "; color: var(--marker); font-size: .8em; }
.rows a:hover { box-shadow: inset 0 -.65em 0 var(--marker-wash); }
.rows .n { font: .72rem var(--mono); color: var(--muted); white-space: nowrap; }
.rows .n.err { color: var(--error); overflow: hidden; text-overflow: ellipsis;
               max-width: 12rem; }

.kv { list-style: none; margin: 0; padding: 0; font-size: .84rem; }
.kv li { display: flex; gap: .8rem; padding: .3rem 0; align-items: baseline; }
.kv .k { color: var(--muted); width: 6.2rem; flex: none; font-size: .78rem; }
.empty { color: var(--muted); font-size: .86rem; margin: 0; }
.empty a { color: inherit; }
:focus-visible { outline: 2px solid var(--marker); outline-offset: 2px; }
</style>

<div class="bar">
  <span class="mark">Rhapsode</span>
  <nav>
    <a class="here" href="/dashboard">Home</a>
    <a href="/">Library</a>
    <form method="post" action="/logout" style="display:inline">
      <button type="submit">Sign out</button>
    </form>
  </nav>
</div>

<main>
  <p class="lede" id="lede">Reading the shelf…</p>
  <p class="sub" id="sub"></p>

  <div class="grid">
    <div class="col">
      <section class="card making" id="makingCard">
        <h2>Making now</h2>
        <div id="making"><p class="empty">Nothing in the queue. Drop a PDF in
          the <a href="/">library</a> to start one.</p></div>
      </section>

      <section class="card">
        <h2>Pick up where you left off</h2>
        <ul class="rows" id="resume"><li class="empty">Nothing started yet.</li></ul>
      </section>

      <section class="card">
        <h2>Recently finished</h2>
        <ul class="rows" id="recent"><li class="empty">Nothing yet.</li></ul>
      </section>
    </div>

    <div class="col">
      <section class="card" id="failedCard" hidden>
        <h2>Needs attention</h2>
        <ul class="rows" id="failed"></ul>
      </section>

      <section class="card">
        <h2>The machinery</h2>
        <ul class="kv" id="machinery"></ul>
      </section>
    </div>
  </div>
</main>

<script>
const $ = s => document.querySelector(s);
const esc = s => String(s ?? "").replace(/[&<>"]/g,
  c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
const clock = s => {
  s = Math.max(0, Math.round(s || 0));
  const h = Math.floor(s / 3600), m = Math.floor(s % 3600 / 60);
  return h ? `${h}h ${String(m).padStart(2, "0")}m` : `${m}m`;
};

function render(d) {
  const st = d.stats;
  $("#lede").innerHTML = st.papers
    ? `<b>${st.papers}</b> papers on the shelf, <b>${st.hours}</b> hours of narration.`
    : "The shelf is empty.";
  const bits = [];
  if (st.by_status.ready) bits.push(`${st.by_status.ready} ready`);
  if (d.queued) bits.push(`${d.queued} queued`);
  if (st.by_status.error) bits.push(`${st.by_status.error} failed`);
  $("#sub").textContent = bits.join(" · ");

  const g = d.generating[0];
  $("#making").innerHTML = g
    ? `<div class="t" style="--fill:${Math.round((g.progress || 0) * 100)}%">${esc(g.title)}</div>
       <div class="meta"><span>${esc(g.stage || "starting")}</span>
         <span class="pct">${Math.round((g.progress || 0) * 100)}%</span>
         ${d.queued ? `<span>${d.queued} waiting</span>` : ""}</div>`
    : `<p class="empty">Nothing generating.${d.queued ? ` ${d.queued} queued.` : ""}</p>`;

  $("#resume").innerHTML = d.resume.length ? d.resume.map(r =>
    `<li><a href="/view/${encodeURIComponent(r.id)}/index.html">${esc(r.title)}</a>
       <span class="n">${clock(r.at)} / ${clock(r.duration)}</span></li>`).join("")
    : `<li class="empty">Nothing started yet.</li>`;

  $("#recent").innerHTML = d.recent.length ? d.recent.map(r =>
    `<li><a href="/view/${encodeURIComponent(r.id)}/index.html">${esc(r.title)}</a></li>`
  ).join("") : `<li class="empty">Nothing yet.</li>`;

  const bad = d.failed.length;
  $("#failedCard").hidden = !bad;
  if (bad) $("#failed").innerHTML = d.failed.map(f =>
    `<li><a href="/">${esc(f.title)}</a><span class="n err" title="${esc(f.error)}">${esc(f.error)}</span></li>`
  ).join("");

  const m = d.machinery;
  $("#machinery").innerHTML = `
    <li><span class="k">voice</span><span>${esc(m.voice)}</span></li>
    <li><span class="k">extraction</span><span>${esc(m.extraction)}</span></li>
    <li><span class="k">disk free</span><span>${m.free_gb ?? "?"} GB</span></li>`;
}

async function tick() {
  try {
    const r = await fetch("/api/dashboard");
    if (r.status === 401) { location.href = "/login"; return; }
    render(await r.json());
  } catch (e) { /* transient: the next tick retries */ }
}
tick();
// poll only while the tab is visible: a background tab must not keep the
// server's idle-exit clock alive forever
setInterval(() => { if (!document.hidden) tick(); }, 4000);
document.addEventListener("visibilitychange", () => { if (!document.hidden) tick(); });
</script>
