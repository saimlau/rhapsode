<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rhapsode · people</title>
<style>
:root {
  --desk: #ECEAE6; --side: #E6E3DC; --ink: #2A2721; --muted: #8A857A;
  --hairline: rgba(40, 33, 20, .14);
  --marker: #F5B301; --marker-wash: rgba(245, 179, 1, .14); --error: #A33F35;
  --serif: "New York", "Iowan Old Style", Georgia, serif;
  --mono: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, monospace;
  --sans: system-ui, -apple-system, "Segoe UI", sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root { --desk: #1B1A18; --side: #22211E; --ink: #E6E2D8; --muted: #8E8A80;
          --hairline: rgba(255,250,235,.13); --marker-wash: rgba(245,179,1,.10);
          --error: #E09287; }
}
* { box-sizing: border-box; }
body { margin: 0; background: var(--desk); color: var(--ink);
       font-family: var(--sans); line-height: 1.5; }
a { color: inherit; }
.bar { display: flex; align-items: baseline; gap: 1.2rem;
       padding: .85rem clamp(1rem, 4vw, 2.5rem); }
.bar .mark { font-family: var(--serif); font-size: 1.1rem; }
.bar nav { margin-left: auto; display: flex; gap: 1.2rem; align-items: baseline; }
.bar a, .bar button { font: 500 .8rem var(--sans); color: var(--muted);
  text-decoration: none; background: none; border: 0; padding: 0; cursor: pointer; }
.bar a:hover, .bar button:hover { color: var(--ink); }
.bar .here { color: var(--ink); box-shadow: inset 0 -6px 0 var(--marker-wash); }
main { max-width: 46rem; margin: 0 auto;
       padding: clamp(.6rem,3vw,2rem) clamp(1rem,4vw,2.5rem) 3rem; }
.lede { font-family: var(--serif); font-size: clamp(1.4rem,3.4vw,1.9rem);
        margin: .6rem 0 1.6rem; font-weight: 500; }
.card { background: var(--side); border: 1px solid var(--hairline);
        border-radius: 12px; padding: 1rem 1.15rem 1.1rem; margin-bottom: 1rem; }
.card h2 { margin: 0 0 .7rem; font: 600 .68rem var(--sans);
           letter-spacing: .13em; text-transform: uppercase; color: var(--muted); }
ul { list-style: none; margin: 0; padding: 0; }
li { display: flex; gap: .8rem; align-items: center; padding: .55rem 0; }
li + li { border-top: 1px solid var(--hairline); }
.who { flex: 1; min-width: 0; font-family: var(--serif); font-size: .98rem;
       overflow: hidden; text-overflow: ellipsis; }
.tag { font: .66rem var(--mono); letter-spacing: .08em; text-transform: uppercase;
       color: var(--marker); border: 1px solid var(--marker); border-radius: 3px;
       padding: 0 .35rem; }
.n { font: .72rem var(--mono); color: var(--muted); white-space: nowrap; }
button.act { font: .72rem var(--mono); color: var(--muted); background: none;
             border: 1px solid var(--hairline); border-radius: 5px;
             padding: .2rem .5rem; cursor: pointer; }
button.act:hover { color: var(--error); border-color: var(--error); }
button.pri { font: 600 .8rem var(--sans); color: var(--desk); background: var(--ink);
             border: 0; border-radius: 4px; padding: .55rem .9rem; cursor: pointer; }
.link { display: flex; gap: .5rem; margin-top: .8rem; align-items: center; }
.link input { flex: 1; font: .74rem var(--mono); padding: .5rem .6rem;
              border: 1px solid var(--marker); border-radius: 5px;
              background: var(--marker-wash); color: var(--ink); }
.empty { color: var(--muted); font-size: .86rem; margin: 0; }
.warn { color: var(--muted); font-size: .76rem; margin: .6rem 0 0;
        border-left: 2px solid var(--marker); padding-left: .6rem; }
:focus-visible { outline: 2px solid var(--marker); outline-offset: 2px; }
</style>

<div class="bar">
  <span class="mark">Rhapsode</span>
  <nav>
    <a href="/dashboard">Home</a>
    <a href="/">Library</a>
    <a class="here" href="/admin">People</a>
    <form method="post" action="/logout" style="display:inline">
      <button type="submit">Sign out</button>
    </form>
  </nav>
</div>

<main>
  <p class="lede">Who can use this library</p>

  <section class="card">
    <h2>Usage</h2>
    <ul id="usage"><li class="empty">…</li></ul>
  </section>

  <section class="card">
    <h2>Accounts</h2>
    <ul id="users"><li class="empty">Loading…</li></ul>
  </section>

  <section class="card">
    <h2>Invitations</h2>
    <ul id="invites"></ul>
    <div class="link" id="newLink" hidden>
      <input id="linkBox" readonly>
      <button class="act" id="copy">Copy</button>
    </div>
    <p style="margin:.9rem 0 0"><button class="pri" id="mint">Create an invite link</button></p>
    <p class="warn">Anyone holding the link can create one account, so send it
      the way you would send a password. It expires in 14 days; revoke it here
      if it goes astray.</p>
  </section>

  <section class="card">
    <h2>Health</h2>
    <ul id="health"><li class="empty">…</li></ul>
  </section>
</main>

<script>
const $ = s => document.querySelector(s);
const esc = s => String(s ?? "").replace(/[&<>"]/g,
  c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
const when = ts => new Date(ts * 1000).toLocaleDateString();

async function load() {
  const r = await fetch("/api/users");
  if (r.status === 403 || r.status === 404) { location.href = "/dashboard"; return; }
  const d = await r.json();

  $("#users").innerHTML = d.users.map(u => `
    <li><span class="who">${esc(u.name)}</span>
        ${u.admin ? '<span class="tag">admin</span>' : ""}
        <span class="n">${u.papers} paper${u.papers === 1 ? "" : "s"}</span>
        ${u.admin ? "" :
          `<button class="act" data-user="${esc(u.name)}">Remove</button>`}</li>`).join("");

  $("#invites").innerHTML = d.invites.length ? d.invites.map(i => `
    <li><span class="who">unused invitation</span>
        <span class="n">expires ${when(i.expires)}</span>
        <button class="act" data-invite="${esc(i.key)}">Revoke</button></li>`).join("")
    : `<li class="empty">No invitations outstanding.</li>`;

  $("#usage").innerHTML = d.users.map(u => {
    const cap = u.quota && u.quota.tts_hours;
    const pct = cap ? Math.min(100, Math.round(u.operator_hours / cap * 100)) : 0;
    const over = cap != null && u.operator_hours >= cap;
    return `<li>
      <span class="who">${esc(u.name)}</span>
      ${u.self_hosting ? '<span class="tag">self-hosting</span>' : ""}
      <span class="n">${u.hours} h total · ${u.operator_hours} h on shared${
        cap != null ? ` / ${cap} h` : ""}</span>
      ${over ? '<span class="tag" style="color:var(--error)">over cap</span>' : ""}
      <button class="act" data-cap="${esc(u.name)}"
        data-cur="${cap == null ? "" : cap}">${cap == null ? "Set cap" : "Change"}</button>
      </li>`;
  }).join("");

  const h = d.health || {};
  $("#health").innerHTML = `
    <li><span class="n">${h.queued || 0} queued · ${h.generating || 0} generating`
    + `${h.free_gb != null ? ` · ${h.free_gb} GB free` : ""}`
    + `${h.needs_attention ? ` · <b style="color:var(--error)">${h.needs_attention} need attention</b>` : ""}`
    + `</span></li>`;
}

$("#mint").addEventListener("click", async () => {
  const r = await fetch("/api/invites", { method: "POST" });
  if (!r.ok) return;
  const { path } = await r.json();
  $("#linkBox").value = location.origin + path;
  $("#newLink").hidden = false;
  $("#linkBox").select();
  load();
});

$("#copy").addEventListener("click", () => {
  $("#linkBox").select();
  navigator.clipboard?.writeText($("#linkBox").value);
});

document.addEventListener("click", async e => {
  const user = e.target.dataset?.user;
  const invite = e.target.dataset?.invite;
  const cap = e.target.dataset?.cap;
  if (cap) {
    const cur = e.target.dataset.cur;
    const val = prompt(`Shared-compute cap for ${cap}, in audio hours `
                       + `(blank = unlimited):`, cur);
    if (val === null) return;
    const quota = { tts_hours: val.trim() === "" ? null : Number(val) };
    await fetch(`/api/users/${encodeURIComponent(cap)}`, { method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ quota }) });
    load();
    return;
  }
  if (user) {
    // removing an account does not remove its papers, and the username can
    // never be reused — say so before it happens, not after
    if (!confirm(`Remove ${user}?\n\nTheir papers stay in the library, owned `
                 + `by a name that can no longer sign in. The username is `
                 + `retired and cannot be given to anyone else.`)) return;
    await fetch(`/api/users/${encodeURIComponent(user)}`, { method: "DELETE" });
    load();
  } else if (invite) {
    await fetch(`/api/invites/${encodeURIComponent(invite)}`, { method: "DELETE" });
    load();
  }
});

load();
</script>
