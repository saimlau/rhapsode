# Rhapsode configuration.
# Copy this file to config.toml (gitignored) and edit for your machine.
# Precedence: command-line flags > config.toml > built-in defaults.

[library]
# Where the GUI stores imported PDFs and generated read-along bundles.
path = "~/PaperAudio"

[tts]
# Kokoro voice id (https://huggingface.co/hexgrad/Kokoro-82M/blob/main/VOICES.md)
voice = "af_heart"
# Speech speed multiplier used at synthesis time (the viewer also has a
# live playback-speed control that doesn't require re-synthesis).
speed = 1.0
# Read-along audio bitrate (24 kHz mono speech; 48k AAC is transparent).
m4a_bitrate = "48k"
# Where synthesis runs: "local" (your GPU/CPU) or "modal" (your own Modal
# account — deploy modal_app.py first; see its docstring). Modal's free
# monthly credits cover hundreds of audio-hours.
backend = "local"
# modal_endpoint = "https://<you>--rhapsode-tts-kokorotts-tts.modal.run"
# modal_token_id = ""      # only if proxy auth is enabled in modal_app.py
# modal_token_secret = ""
# Idle model lifecycle in the GUI server: park the model to CPU RAM after
# park_after_s (instant resume), fully unload after unload_after_s (~2 s
# reload on next use). Frees ~700 MiB VRAM between generation bursts.
park_after_s = 300
unload_after_s = 1800

[render]
# Page image resolution for the read-along view, in DPI.
dpi = 150

[llm]
# Optional LLM block-classification extractor. When enabled (and a runner is
# available) this REPLACES GROBID as the primary extractor: it shows the model
# only each PDF block's location and first/last sentence, asks which blocks are
# body content and in what reading order, then emits the blocks' own text with
# rectangles from their word boxes. Nothing is invented (original text only),
# and it recovers body text GROBID drops around first-page footnotes and
# column/page breaks. GROBID (or the built-in heuristics) is the fallback if
# the LLM is off or fails.
enabled = false
# Which runner to use. "auto" prefers a local/free one, in this order:
#   ollama (local Gemma on your GPU)  ->  claude (Claude Code, your Pro/Max
#   subscription)  ->  codex (Codex CLI, your ChatGPT subscription)  ->  api.
# The agent CLIs authenticate with your existing subscription — no API key and
# no per-token billing. Force one with "ollama" | "claude" | "codex" | "api".
# One classification call per paper: seconds on ollama/api, a couple of
# minutes on the Claude/Codex CLIs (agent-turn overhead, not output size).
runner = "auto"
# Model id: an ollama model ("gemma4:12b" fits a 16 GB GPU; "gemma4:26b" MoE
# is tighter; see ollama.com/library/gemma4) or an api model id. Leave blank
# for the runner's default. The CLIs use their own logged-in model regardless.
model = ""
timeout_s = 120
# ollama_url = "http://127.0.0.1:11434"   # if ollama isn't on the default host
# Only for runner = "api" (a raw key, billed per-use — the CLIs above don't
# need this). provider is "anthropic" | "openai" | "gemini".
# api_provider = "gemini"
# api_key = ""

[gui]
# Port for `rhapsode --gui` (auto-probes upward if busy).
port = 7717
# Open a browser tab when the server starts (set false if you keep a tab).
open = true
# Exit the server after this many minutes with no real activity (0 = never).
# Uploads, playback, and page loads count; idle background tabs don't.
# Pairs with packaging/rhapsode.service for start-on-demand.
idle_exit_min = 0

[grobid]
# GROBID (scholarly-PDF structure ML) as the primary extractor; the
# built-in heuristics are the fallback when it's unavailable.
enabled = true
url = "http://127.0.0.1:8070"
# Auto-start the service from a native GROBID source install at `home`
# (built with `./gradlew clean install`; a jdk/ subdir with JDK 17 is
# used automatically if present, since GROBID needs Java <= 17).
autostart = true
# home = "~/Documents/grobid-0.8.1"
# Stop a GROBID service we started after this much idle time (its JVM
# holds 2-4 GB RAM); it restarts automatically on the next paper.
idle_stop_s = 600
