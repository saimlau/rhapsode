# paper2audio configuration.
# Copy this file to config.toml (gitignored) and edit for your machine.
# Precedence: command-line flags > config.toml > built-in defaults.

[library]
# Where the GUI stores imported PDFs and generated read-along bundles.
path = "~/PaperAudio"

[tts]
# Kokoro voice id (https://huggingface.co/hexgrad/Kokoro-82M/blob/main/VOICES.md)
voice = "af_heart"
# Speech speed multiplier used at synthesis time (the viewer also has a
# live playback-speed control that doesn't require re-synthesis).
speed = 1.0

[render]
# Page image resolution for the read-along view, in DPI.
dpi = 150

[gui]
# Port for `paper2audio --gui` (auto-probes upward if busy).
port = 7717
# Open a browser tab when the server starts (set false if you keep a tab).
open = true

[grobid]
# GROBID (scholarly-PDF structure ML) as the primary extractor; the
# built-in heuristics are the fallback when it's unavailable.
enabled = true
url = "http://127.0.0.1:8070"
# Auto-start the service from a native GROBID source install at `home`
# (built with `./gradlew clean install`; a jdk/ subdir with JDK 17 is
# used automatically if present, since GROBID needs Java <= 17).
autostart = true
# home = "~/Documents/grobid-0.8.1"
