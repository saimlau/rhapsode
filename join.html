<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Join Rhapsode</title>
<style>
:root {
  --desk: #ECEAE6; --side: #E6E3DC; --ink: #2A2721; --muted: #8A857A;
  --hairline: rgba(40, 33, 20, .14);
  --marker: #F5B301; --marker-wash: rgba(245, 179, 1, .14); --error: #A33F35;
  --serif: "New York", "Iowan Old Style", Georgia, serif;
  --mono: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, monospace;
  --sans: system-ui, -apple-system, "Segoe UI", sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root { --desk: #1B1A18; --side: #22211E; --ink: #E6E2D8; --muted: #8E8A80;
          --hairline: rgba(255,250,235,.13); --marker-wash: rgba(245,179,1,.10);
          --error: #E09287; }
}
* { box-sizing: border-box; }
body { margin: 0; min-height: 100vh; display: grid; place-items: center;
       background: var(--desk); color: var(--ink); font-family: var(--sans);
       padding: 1.5rem; }
main { width: min(23rem, 100%); }
h1 { font: 500 1.9rem var(--serif); margin: 0; letter-spacing: -.01em; }
.tag { color: var(--muted); font-size: .84rem; margin: .3rem 0 2rem; }
label { display: block; font: .7rem var(--mono); letter-spacing: .13em;
        text-transform: uppercase; color: var(--muted); margin-bottom: .5rem; }
input { width: 100%; padding: .7rem .8rem; font: inherit; color: var(--ink);
        background: var(--side); border: 1px solid var(--hairline);
        border-radius: 3px; outline: none; }
input:focus { background: var(--marker-wash); border-color: var(--marker);
              box-shadow: inset 0 -2px 0 var(--marker); }
.hint { color: var(--muted); font-size: .74rem; margin: .4rem 0 0; }
button { margin-top: 1.3rem; width: 100%; padding: .7rem; font: inherit;
         font-weight: 600; color: var(--desk); background: var(--ink);
         border: 0; border-radius: 3px; cursor: pointer; }
button:hover { background: #3b3730; }
@media (prefers-color-scheme: dark) { button:hover { background: #d8d3c6; } }
button:focus-visible, input:focus-visible { outline: 2px solid var(--marker);
  outline-offset: 2px; }
.bad { color: var(--error); font-size: .82rem; margin: 1rem 0 0;
       border-left: 2px solid var(--error); padding-left: .6rem; }
.bad:empty { display: none; }
footer { margin-top: 2.5rem; color: var(--muted); font-size: .72rem;
         font-family: var(--mono); border-top: 1px solid var(--hairline);
         padding-top: .8rem; }
</style>

<main>
  <h1>Rhapsode</h1>
  <p class="tag">you've been invited — choose how to sign in</p>

  <form method="post" action="/join/{{token}}" {{formhidden}}>
    <label for="who">Username</label>
    <input id="who" name="username" type="text" autofocus required
           autocapitalize="none" autocorrect="off" spellcheck="false"
           autocomplete="username" minlength="3" maxlength="32"
           pattern="[A-Za-z0-9._\-]{3,32}">
    <p class="hint">Letters, digits, dot, dash or underscore.</p>

    <label for="pw" style="margin-top:1.1rem">Password</label>
    <input id="pw" name="password" type="password" required minlength="8"
           autocomplete="new-password">
    <p class="hint">At least 8 characters. Only you will know it.</p>

    <button type="submit">Create account</button>
  </form>

  <p class="bad">{{error}}</p>
  <footer>This library is private. Your shelf starts empty.</footer>
</main>
